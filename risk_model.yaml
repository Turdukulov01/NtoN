override_rules:
  - id: mixer_1hop_exposure
    type: tag_within_hops
    tags: [mixer, anonymizing_activity]
    max_hop: 1
    final_score: 100
    risk_zone: RED
    reason: "Миксер или сервис сокрытия происхождения средств на расстоянии <= 1 hop"
  - id: sanctions_1hop_exposure
    type: tag_within_hops
    tags: [sanction]
    max_hop: 1
    final_score: 100
    risk_zone: RED
    reason: "Санкционная экспозиция на расстоянии <= 1 hop"
  - id: darknet_exposure
    type: tag_within_hops
    tags: [darkmarket, darkservice]
    max_hop: 1
    final_score: 100
    risk_zone: RED
    reason: "Связь <= 1 hop с darknet-адресом"
  - id: ransomware_exposure
    type: tag_within_hops
    tags: [ransom]
    max_hop: 3
    final_score: 100
    risk_zone: RED
    reason: "Экспозиция на ransomware"
  - id: critical_illicit_tag
    type: tag_within_hops
    tags:
      - scam
      - illegal
      - ponzi
      - hacking
      - phishing
      - blackmail
      - malware
      - stolen_token
      - drugs
      - illegal_arms_sell
      - tfrisk
      - child_abuse_material
      - human_trafficking
      - enforcement_actions
      - fpwmd
      - adult_content
      - ua_support
      - nft
      - extremism
    max_hop: 1
    final_score: 100
    risk_zone: RED
    reason: "Критический криминальный risk tag на расстоянии <= 1 hop"
  - id: sof_sow_refused
    type: context_equals
    path: "participant_profile.sof_sow_status"
    value: "refused"
    final_score: 100
    risk_zone: RED
    reason: "Отказ от предоставления SoF/SoW"
  - id: sof_sow_inconsistent_profile
    type: context_equals
    path: "participant_profile.sof_sow_status"
    value: "inconsistent_profile"
    final_score: 100
    risk_zone: RED
    reason: "Заявленный доход не соответствует объему операций"
  - id: privacy_or_unknown_asset
    type: context_equals
    path: "participant_profile.asset_type"
    values: ["privacy_coin", "unknown_token", "unverified_token"]
    final_score: 100
    risk_zone: RED
    reason: "Использование privacy-коинов или неидентифицированных токенов"
  - id: revoked_license
    type: context_equals
    path: "participant_profile.license_status"
    value: "revoked"
    final_score: 100
    risk_zone: RED
    reason: "Отозванная лицензия"
  - id: criminal_reputation_link
    type: context_equals
    path: "participant_profile.reputation"
    values: ["criminal_link", "confirmed_illicit"]
    final_score: 100
    risk_zone: RED
    reason: "Связь участника с криминальной деятельностью"
  - id: high_risk_dex_pool
    type: context_equals
    path: "transaction_profile.dex_usage"
    value: "high_risk_pool"
    final_score: 100
    risk_zone: RED
    reason: "DEX high-risk pool или sanctioned/darknet liquidity"
  - id: high_risk_liquidity_pool
    type: context_equals
    path: "transaction_profile.liquidity_pool_status"
    value: "high_risk_pool"
    final_score: 100
    risk_zone: RED
    reason: "High-risk liquidity pool, связанный с fraud/darknet/ransomware"
  - id: aml_kyc_bypass
    type: context_equals
    path: "control_profile.aml_kyc_status"
    value: "bypass"
    final_score: 100
    risk_zone: RED
    reason: "Намеренный обход процедур KYC/AML"
  - id: non_cooperation
    type: context_equals
    path: "control_profile.request_response"
    values: ["ignored", "refused"]
    final_score: 100
    risk_zone: RED
    reason: "Отказ от сотрудничества или игнорирование запросов"
  - id: regulatory_non_cooperation
    type: context_equals
    path: "control_profile.regulatory_reporting"
    values: ["refused", "non_cooperation"]
    final_score: 100
    risk_zone: RED
    reason: "Отказ от сотрудничества с расследованием или регулятором"
  - id: no_client_funds_records
    type: context_equals
    path: "control_profile.client_funds_segregation"
    value: "no_records"
    final_score: 100
    risk_zone: RED
    reason: "Нет учета клиентских средств"
