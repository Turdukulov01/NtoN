model:
  name: "Модель риск-скоринга кошельков ChainLens"
  version: "2025-12-01"
  score_min: 0
  score_max: 100
  block_score_cap: 100

weights:
  A: 0.25
  B: 0.25
  C: 0.25
  D: 0.25

zones:
  GREEN:
    min: 0
    max: 25
    label: "Низкий"
    category: "low"
    monitoring_frequency: "quarterly"
    recommended_actions:
      - standard_monitoring
  YELLOW:
    min: 26
    max: 50
    label: "Средний"
    category: "medium"
    monitoring_frequency: "monthly"
    recommended_actions:
      - enhanced_monitoring
      - request_sof_sow
  ORANGE:
    min: 51
    max: 75
    label: "Высокий"
    category: "high"
    monitoring_frequency: "weekly"
    recommended_actions:
      - manual_review
      - restrict_operations
      - prepare_compliance_report
  RED:
    min: 76
    max: 100
    label: "Критический"
    category: "critical"
    monitoring_frequency: "real_time"
    recommended_actions:
      - block_operations
      - notify_financial_supervision_24h
      - file_suspicious_operation_report
      - freeze_assets_pending_investigation

action_labels:
  standard_monitoring: "Стандартный мониторинг"
  enhanced_monitoring: "Усиленный контроль"
  request_sof_sow: "Запрос источника средств / источника благосостояния"
  manual_review: "Ручная комплаенс-проверка"
  restrict_operations: "Ограничить операции до проверки"
  prepare_compliance_report: "Подготовить внутренний комплаенс-отчет"
  block_operations: "Блокировать операции"
  notify_financial_supervision_24h: "Уведомить Финнадзор в течение 24 часов"
  file_suspicious_operation_report: "Подать сообщение о подозрительной операции"
  freeze_assets_pending_investigation: "Заморозить активы до расследования"
  jurisdiction_edd: "Провести EDD по FATF-юрисдикции"
  apply_fatf_countermeasures: "Рассмотреть контрмеры FATF"
  sanctions_confirmed_match: "Подтвержденное совпадение с санкционным списком"

data_sources:
  sanctions_lists:
    uk_ofsi:
      source: "UK Sanctions List"
      source_url: "https://sanctionslist.fcdo.gov.uk/docs/UK-Sanctions-List.xml"
      format: "xml"
      as_of: "2026-06-26"
      screening_policy:
        confirmed_match:
          final_score: 100
          risk_zone: RED
          recommended_actions:
            - block_operations
            - freeze_assets_pending_investigation
            - notify_financial_supervision_24h
            - sanctions_confirmed_match
        weak_match:
          override: false
          recommended_actions:
            - manual_review
  fatf_jurisdictions:
    source: "FATF High-risk and other monitored jurisdictions"
    source_urls:
      high_risk_call_for_action: "https://www.fatf-gafi.org/en/publications/High-risk-and-other-monitored-jurisdictions/call-for-action-june-2026.html"
      increased_monitoring: "https://www.fatf-gafi.org/en/publications/High-risk-and-other-monitored-jurisdictions/increased-monitoring-june-2026.html"
    as_of: "2026-06-19"
    scoring:
      high_risk_call_for_action: 25
      increased_monitoring: 18
      vigilance: 8
      not_listed: 0
    policy:
      high_risk_call_for_action:
        minimum_score: 51
        recommended_actions:
          - jurisdiction_edd
          - apply_fatf_countermeasures
          - manual_review
          - restrict_operations
        reason: "FATF: юрисдикция из списка call for action; применить усиленную проверку и при необходимости контрмеры"
      increased_monitoring:
        minimum_score: 26
        recommended_actions:
          - jurisdiction_edd
          - enhanced_monitoring
          - request_sof_sow
        reason: "FATF: юрисдикция под усиленным мониторингом; применить усиленную проверку"
      vigilance:
        minimum_score: 0
        recommended_actions:
          - enhanced_monitoring
        reason: "FATF: требуется риск-ориентированный мониторинг"
    high_risk_call_for_action:
      - name: "Democratic People's Republic of Korea"
        iso2: KP
        iso3: PRK
        aliases: ["DPRK", "North Korea", "КНДР", "Северная Корея"]
