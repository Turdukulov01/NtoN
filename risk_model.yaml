blocks:
  A:
    label: "Профиль участника"
    aggregation: "average"
    components:
      A1_jurisdiction:
        label: "Юрисдикция"
        kind: "jurisdiction_list"
        source: "context.participant_profile.jurisdiction"
        fallback_sources:
          - "context.participant_profile.country"
          - "context.participant_profile.jurisdiction_risk"
        default: "not_provided"
        options:
          not_provided: 0
          low: 0
          regulated: 0
          basic_regulation: 10
          medium: 10
          partial_fatf: 15
          high: 20
          offshore: 20
          prohibited: 25
          high_risk: 25
      A2_license:
        label: "Лицензия / регистрация"
        source: "context.participant_profile.license_status"
        default: "not_provided"
        options:
          not_provided: 0
          licensed: 0
          full: 0
          registered: 10
          partial: 12
          pending: 15
          temporary: 15
          unlicensed: 25
          revoked: 25
      A3_ubo_transparency:
        label: "UBO"
        source: "context.participant_profile.ubo_transparency"
        default: "not_provided"
        options:
          not_provided: 0
          known: 0
          full: 0
          partial: 12
          nominee: 18
          hidden: 25
          unknown: 25
          pep: 10
      A4_reputation:
        label: "Репутация и публичный профиль"
        source: "context.participant_profile.reputation"
        default: "not_provided"
        options:
          not_provided: 0
          clean: 0
          positive: 0
          neutral: 8
          minor_issues: 8
          complaints: 15
          adverse_media: 15
          violations: 25
          confirmed_illicit: 25
          criminal_link: 25

  B:
    label: "Активы и операции"
    aggregation: "average"
    components:
      B1_asset_type:
        label: "Тип виртуальных активов"
        source: "context.participant_profile.asset_type"
        fallback_sources:
          - "context.wallet_profile.asset_type"
        default: "not_provided"
        options:
          not_provided: 0
          major_crypto: 3
          regulated_crypto: 3
          stablecoin_regulated: 6
          stablecoin: 8
          altcoin: 12
          defi_token: 15
          nft: 15
          privacy_coin: 30
          unknown_token: 30
          unverified_token: 30
      B2_sof_sow:
        label: "Источник средств / источник благосостояния"
        source: "context.participant_profile.sof_sow_status"
        default: "not_provided"
        options:
          not_provided: 0
          verified: 0
          full: 0
          partial: 12
          transaction_only: 12
          self_declared: 20
          declared_unverified: 20
          refused: 35
          inconsistent_profile: 35
      B3_mixer_tumbler_bridge:
        label: "Миксеры / tumblers / мосты"
        source: "metrics.external_kyt_mixer_bridge_exposure_percent"
        fallback_sources:
          - "metrics.external_kyt_obfuscation_exposure_percent"
        missing_score: 0
        thresholds:
          - { gte: 20, score: 35 }
          - { gte: 5, score: 15 }
          - { gte: 0.01, score: 10 }
          - { gte: 0, score: 0 }
      B4_dex_usage:
        label: "Использование DEX"
        source: "context.transaction_profile.dex_usage"
        fallback_sources:
          - "metrics.external_kyt_dex_exposure_percent"
        default: "none"
        options:
          none: 0
          cex_only: 0
          regulated_dex: 5
          popular_dex: 12
          dex_layering: 20
          high_risk_pool: 20
        thresholds:
          - { gte: 20, score: 20 }
          - { gte: 1, score: 12 }
          - { gte: 0.01, score: 5 }
          - { gte: 0, score: 0 }

  C:
    label: "Транзакционный риск"
    aggregation: "average"
    components:
      C1_transaction_volume:
        label: "Объемы транзакций"
        source: "context.transaction_profile.volume_profile"
        fallback_sources:
          - "context.participant_profile.volume_profile"
        default: "not_provided"
        options:
          not_provided: 0
          within_profile: 3
          two_to_five_x: 12
          above_profile_2_5x: 12
          above_profile_gt_5x: 20
          structuring: 20
          smurfing: 20
      C2_frequency:
        label: "Частота транзакций"
        source: "metrics.tx_per_month"
        thresholds:
          - { gte: 1000, score: 18 }
          - { gte: 100, score: 12 }
          - { gte: 10, score: 5 }
          - { gte: 0, score: 0 }
      C3_geography:
        label: "География операций"
        source: "context.transaction_profile.geography_status"
        fallback_sources:
          - "context.participant_profile.operation_geography"
        default: "not_provided"
        options:
          not_provided: 0
          single_low_risk: 3
          regulated_countries: 8
          offshore: 18
          high_risk_countries: 25
          rapid_jurisdiction_hopping: 25
      C4_counterparties:
        label: "Контрагенты"
        source: "context.transaction_profile.counterparty_status"
        fallback_sources:
          - "metrics.closest_risk_hop"
        default: "not_provided"
        options:
          not_provided: 0
          verified: 2
          known_cex: 2
          partially_identified: 10
          p2p: 10
          mostly_unhosted: 18
          sanctions_2_3_hops: 20
          sanctions_direct: 20
        thresholds:
          - { lte: 1, score: 20 }
          - { lte: 3, score: 18 }
      C5_liquidity_pools:
        label: "Пулы ликвидности"
        source: "context.transaction_profile.liquidity_pool_status"
        fallback_sources:
          - "metrics.external_kyt_liquidity_pool_exposure_percent"
        default: "none"
        options:
          none: 0
          legitimate: 5
          known_tokens_pool: 5
          unaudited: 12
          high_risk_pool: 15
        thresholds:
          - { gte: 10, score: 15 }
          - { gte: 1, score: 12 }
          - { gte: 0.01, score: 5 }
          - { gte: 0, score: 0 }

  D:
    label: "Комплаенс и контроль"
    aggregation: "average"
    components:
      D1_aml_kyc:
        label: "Политики AML/KYC"
        source: "context.control_profile.aml_kyc_status"
        default: "not_provided"
        options:
          not_provided: 0
          full: 1
          complete: 1
          basic: 12
          standard: 12
          partial: 22
          weak: 22
          absent: 30
          no_policy: 30
          bypass: 30
      D2_client_funds_segregation:
        label: "Учет клиентских средств"
        source: "context.control_profile.client_funds_segregation"
        default: "not_provided"
        options:
          not_provided: 0
          full: 0
          daily_reconciliation: 0
          partial: 15
          mixed_custody: 15
          not_separate: 25
          no_records: 25
      D3_regulatory_reporting:
        label: "Отчетность регулятору"
        source: "context.control_profile.regulatory_reporting"
        default: "not_provided"
        options:
          not_provided: 0
          proactive: 1
          monthly: 1
          regular: 8
          quarterly: 8
          irregular: 18
          delayed: 18
          none: 25
          refused: 25
          non_cooperation: 25
      D4_request_response:
        label: "Реакция на запросы"
        source: "context.control_profile.request_response"
        default: "not_provided"
        options:
          not_provided: 0
          fast: 1
          less_than_24h: 1
          standard: 8
          one_to_three_days: 8
          slow: 15
          more_than_5_days: 15
          ignored: 20
          refused: 20

