function edgePurpose(edge) {
  const methods = edge.methods || [];
  const types = edge.tx_types || [];
  if (methods.length) return methods.slice(0, 2).join(', ');
  if (types.length) return types.slice(0, 2).join(', ');
  return 'transfer';
}

function buildTraceRowsFromEdges(edges, side) {
  const groups = new Map();
  edges.forEach(edge => {
    const nodeKey = edge[side];
    const nodeRows = groups.get(nodeKey) || new Map();
    const row = nodeRows.get(edge.asset) || { asset: edge.asset, amount: 0, usd_value: 0 };
    row.amount += Number(edge.amount || 0);
    row.usd_value += Number(edge.usd_value || 0);
    nodeRows.set(edge.asset, row);
    groups.set(nodeKey, nodeRows);
  });
  return groups;
}

function formatTraceRows(rows, empty = 'Нет данных') {
  if (!rows || !rows.length) return empty;
  return rows.slice(0, 2).map(row => `${fmtTraceNumber(row.amount, 4)} ${esc(row.asset)}${Number(row.usd_value || 0) > 0 ? ` ≈ ${fmtTraceUsdt(row.usd_value)}` : ''}`).join('<br/>');
}

function traceEdgeConnectedTo(edge, nodeId) {
  return !!nodeId && (edge.from === nodeId || edge.to === nodeId);
}

function clampOffset(value, maxValue) {
  return Math.max(-maxValue, Math.min(maxValue, value));
}

function buildTraceAnchorOffsets(edges, positions, spacing = 14, maxOffset = 72) {
  const sourceGroups = new Map();
  const targetGroups = new Map();

  edges.forEach(edge => {
    const from = positions[edge.from];
    const to = positions[edge.to];
    if (!from || !to) return;

    const sourceRows = sourceGroups.get(edge.from) || [];
    sourceRows.push(edge);
    sourceGroups.set(edge.from, sourceRows);

    const targetRows = targetGroups.get(edge.to) || [];
    targetRows.push(edge);
    targetGroups.set(edge.to, targetRows);
  });

  const source = new Map();
  const target = new Map();

  sourceGroups.forEach(group => {
    group.sort((a, b) => (positions[a.to]?.y || 0) - (positions[b.to]?.y || 0) || String(a.id).localeCompare(String(b.id)));
    group.forEach((edge, index) => {
      source.set(edge.id, clampOffset((index - (group.length - 1) / 2) * spacing, maxOffset));
    });
  });

  targetGroups.forEach(group => {
    group.sort((a, b) => (positions[a.from]?.y || 0) - (positions[b.from]?.y || 0) || String(a.id).localeCompare(String(b.id)));
    group.forEach((edge, index) => {
      target.set(edge.id, clampOffset((index - (group.length - 1) / 2) * spacing, maxOffset));
    });
  });

  return { source, target };
}

function lerpPoint(a, b, t) {
  return {
    x: a.x + (b.x - a.x) * t,
    y: a.y + (b.y - a.y) * t,
  };
}

function cubicPath(points) {
  const [p0, p1, p2, p3] = points;
  return `M ${p0.x} ${p0.y} C ${p1.x} ${p1.y}, ${p2.x} ${p2.y}, ${p3.x} ${p3.y}`;
}

function cubicTailPath(points, startAt = 0.68) {
  const [p0, p1, p2, p3] = points;
  const p01 = lerpPoint(p0, p1, startAt);
  const p12 = lerpPoint(p1, p2, startAt);
  const p23 = lerpPoint(p2, p3, startAt);
  const p012 = lerpPoint(p01, p12, startAt);
  const p123 = lerpPoint(p12, p23, startAt);
  const p0123 = lerpPoint(p012, p123, startAt);
  return cubicPath([p0123, p123, p23, p3]);
}

function hasTraceUnmatchedOutflow(node, outgoingRows) {
  if (!node || node.root || !outgoingRows?.length) return false;
  const incomingByAsset = new Map();
  (node.incoming_trace || []).forEach(row => {
    incomingByAsset.set(row.asset, (incomingByAsset.get(row.asset) || 0) + Number(row.amount || 0));
  });
  return outgoingRows.some(row => {
    const sent = Number(row.amount || 0);
    const received = incomingByAsset.get(row.asset) || 0;
    return sent > 0 && sent > received * 1.000001;
  });
}

function buildTraceGraphLayout(result) {
  const nodes = result?.nodes || [];
  const edges = result?.edges || [];
  const byDepth = new Map();
  nodes.forEach(node => {
    const rawDepth = Number(node.depth || 0);
    const depth = node.source_only ? rawDepth - 0.45 : rawDepth;
    if (!byDepth.has(depth)) byDepth.set(depth, []);
    byDepth.get(depth).push(node);
  });

  const depthKeys = [...byDepth.keys()].sort((a, b) => a - b);
  const expanded = !!state.traceExpanded;
  let maxRows = 1;

  const sortedByDepth = new Map();
  depthKeys.forEach(depth => {
    const levelNodes = byDepth.get(depth).sort((a, b) => {
      if (a.root) return -1;
      if (b.root) return 1;
      const aValue = (a.incoming_trace || []).reduce((sum, row) => sum + traceEdgeValue(row), 0);
      const bValue = (b.incoming_trace || []).reduce((sum, row) => sum + traceEdgeValue(row), 0);
      return bValue - aValue || a.address.localeCompare(b.address);
    });
    sortedByDepth.set(depth, levelNodes);
    maxRows = Math.max(maxRows, levelNodes.length || 1);
  });

  const densityBoost = Math.min(expanded ? 170 : 80, Math.max(0, edges.length - 10) * (expanded ? 2.4 : 1.1));
  const columnGap = (expanded ? 520 : 420) + densityBoost;
  const denseRows = Math.max(0, maxRows - 5);
  const rowGap = Math.max(expanded ? 178 : 158, (expanded ? 220 : 190) - denseRows * (expanded ? 4 : 3));
  const sidePadding = expanded ? 420 : 300;
  const topPadding = expanded ? 170 : 120;
  const positions = {};

  depthKeys.forEach((depth, depthIndex) => {
    const levelNodes = sortedByDepth.get(depth) || [];
    const columnJitter = (depthIndex % 2) * Math.min(22, rowGap * 0.28);
    const offset = (maxRows - levelNodes.length) * rowGap / 2;
    levelNodes.forEach((node, index) => {
      positions[node.id] = {
        x: sidePadding + depthIndex * columnGap,
        y: topPadding + offset + index * rowGap + columnJitter,
      };
    });
  });

  const width = Math.max(expanded ? 2400 : 1500, sidePadding * 2 + Math.max(1, depthKeys.length - 1) * columnGap);
  const height = Math.max(expanded ? 920 : 620, topPadding * 2 + Math.max(1, maxRows - 1) * rowGap + 260);

  return { nodes, edges, positions, width, height };
}

function traceDepthLabel(node) {
  if (node?.source_only) return 'источник';
  const value = Number(node?.depth || 0);
  if (value < 0) return `${Math.abs(value)} ур. до`;
  return `${value} ур.`;
}

function renderTraceNode(node, position, outgoingRows = []) {
  const depth = Number(node.depth || 0);
  const title = node.root
    ? 'Стартовый кошелёк'
    : node.fetched
    ? 'Проверенный адрес'
    : depth < 0
    ? 'Адрес-источник'
    : 'Адрес в ветке';
  const outflowHint = hasTraceUnmatchedOutflow(node, outgoingRows)
    ? '<div class="trace-node-hint">Отправлено больше, чем пришло по показанному пути: были другие средства или входы.</div>'
    : '';
  const meta = `
    <span style="color:var(--text3)">Получено по показанным связям:</span><br/>${formatTraceRows(node.incoming_trace, 'Входящих связей нет')}
    <br/><span style="color:var(--text3)">Отправлено из адреса:</span><br/>${formatTraceRows(outgoingRows, 'Исходящих связей нет')}
    ${outflowHint}
  `;
  const status = node.error
    ? esc(node.error)
    : node.fetched
    ? `проверено ${node.tx_count || 0} транз. · вход ${node.in_edges || 0} · исход ${node.out_edges || 0}`
    : node.source_only
    ? 'источник входящего перевода'
    : 'конец выбранной глубины';
  return `
    <div class="trace-node ${node.root ? 'root' : ''} ${node.source_only ? 'source-context' : ''} ${state.traceNodeDetailId === node.id ? 'selected' : ''} ${node.fetched ? '' : 'pending'}" style="left:${position.x}px;top:${position.y}px" onclick="openTraceNodeDetails(${jsString(node.id)})">
      <div class="trace-node-head">
        <span>${title}</span>
        <span>${traceDepthLabel(node)}</span>
      </div>
      <div class="trace-address" onclick="event.stopPropagation();copyAddr(${jsString(node.address)})" data-tip="Нажмите для копирования">${shortAddr(node.address)}</div>
      <div class="trace-node-meta">${meta}</div>
      <div class="trace-node-foot">
        <span>${status}</span>
        <span>${node.root ? 'старт' : 'переход'}</span>
      </div>
    </div>`;
}

function summarizeTraceEdgeRows(edges) {
  const byAsset = new Map();
  edges.forEach(edge => {
    const row = byAsset.get(edge.asset) || { asset: edge.asset, amount: 0, usd_value: 0, tx_count: 0 };
    row.amount += Number(edge.amount || 0);
    row.usd_value += Number(edge.usd_value || 0);
    row.tx_count += Number(edge.tx_count || 0);
    byAsset.set(edge.asset, row);
  });
  return [...byAsset.values()].sort((a, b) => b.usd_value - a.usd_value || b.amount - a.amount);
}

function renderTraceHashPreview(edge) {
  const hashes = (edge.hashes || []).filter(Boolean);
  if (!hashes.length) return 'хэш: —';
  const preview = hashes.slice(0, 3).map(hash => `
    <span class="addr mono" onclick="event.stopPropagation();copyAddr(${jsString(hash)})">${shortAddr(hash)}</span>
  `).join(', ');
  const more = hashes.length > 3 || Number(edge.tx_count || 0) > hashes.length
    ? ` · ещё ${Math.max(0, Number(edge.tx_count || 0) - Math.min(3, hashes.length))}`
    : '';
  return `хэш: ${preview}${more}`;
}

function renderTraceNodeEdgeList(edges, emptyText) {
  if (!edges.length) {
    return `<div class="trace-node-edge-meta">${emptyText}</div>`;
  }
  return edges.map(edge => `
    <div class="trace-node-edge" onclick="openTraceEdgeDetails(${jsString(edge.id)})">
      <div class="trace-node-edge-main">
        <div class="trace-node-edge-amount">${fmtTraceNumber(edge.amount, 6)} ${esc(edge.asset)}</div>
        <span class="${edge.direction === 'incoming' ? 'badge badge-in' : 'badge badge-out'}">${edge.direction === 'incoming' ? 'Вход' : 'Исход'}</span>
      </div>
      <div class="trace-node-edge-path">
        от <span class="mono addr" onclick="event.stopPropagation();copyAddr(${jsString(edge.from_address)})">${shortAddr(edge.from_address)}</span>
        → к <span class="mono addr" onclick="event.stopPropagation();copyAddr(${jsString(edge.to_address)})">${shortAddr(edge.to_address)}</span>
      </div>
      <div class="trace-node-edge-meta">
        ${edge.tx_count || 0} транз. · ${fmtTraceUsdt(edge.usd_value)} · ${esc(edgePurpose(edge))}<br/>
        ${fmtDate(edge.first_seen)} → ${fmtDate(edge.last_seen)}<br/>
        ${renderTraceHashPreview(edge)}
      </div>
    </div>
  `).join('');
}

function renderTraceNodeDetailsPanel(result, nodeId, assetFilter = state.traceNodeDetailAsset || 'all') {
  if (!nodeId) return '';
  const node = (result?.nodes || []).find(item => item.id === nodeId);
  if (!node) return '';

  const allIncoming = (result?.edges || [])
    .filter(edge => edge.to === nodeId)
    .sort((a, b) => traceEdgeValue(b) - traceEdgeValue(a));
  const allOutgoing = (result?.edges || [])
    .filter(edge => edge.from === nodeId)
    .sort((a, b) => traceEdgeValue(b) - traceEdgeValue(a));
  const normalizedAssetFilter = assetFilter && assetFilter !== 'all' ? String(assetFilter) : 'all';
  const incoming = allIncoming.filter(edge => normalizedAssetFilter === 'all' || edge.asset === normalizedAssetFilter);
  const outgoing = allOutgoing.filter(edge => normalizedAssetFilter === 'all' || edge.asset === normalizedAssetFilter);
  const incomingSummary = summarizeTraceEdgeRows(incoming);
  const outgoingSummary = summarizeTraceEdgeRows(outgoing);
  const hiddenIncoming = allIncoming.length - incoming.length;
  const hiddenOutgoing = allOutgoing.length - outgoing.length;
  const missingAsset = String(state.traceNodeDetailMissingAsset || '');
  const isAssetEmpty = normalizedAssetFilter !== 'all' && !incoming.length && !outgoing.length;
  const filterLabel = missingAsset && normalizedAssetFilter === 'all'
    ? `нет ${missingAsset} · показаны все связи`
    : normalizedAssetFilter === 'all'
    ? 'показаны все активы'
    : `показан фильтр ${normalizedAssetFilter}`;
  const missingAssetNote = missingAsset && normalizedAssetFilter === 'all'
    ? `<div class="trace-node-edge-meta" style="margin:8px 0 10px;color:var(--amber)">Адрес связан с графом другим активом. В список он попал потому, что по ${esc(missingAsset)} в текущем графе у него нет входящих или исходящих связей.</div>`
    : '';
  const hiddenLabel = normalizedAssetFilter === 'all' || (!hiddenIncoming && !hiddenOutgoing)
    ? ''
    : `<div class="trace-node-edge-meta" style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span>Скрыто другим активом: ${hiddenIncoming} входящих · ${hiddenOutgoing} исходящих.</span>
        <button class="btn btn-ghost btn-sm" onclick="openTraceNodeDetails(${jsString(node.id)}, ${jsString(state.traceNodeDetailScope || 'graph')}, 'all')">Показать все активы</button>
      </div>`;

  return `
    <div class="trace-node-panel" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()">
      <div class="trace-node-panel-head">
        <div>
          <div class="trace-node-panel-title">${node.root ? 'Стартовый кошелёк' : node.source_only ? 'Источник входящего перевода' : 'Выбранный адрес'}</div>
          <div class="trace-node-panel-address" onclick="copyAddr(${jsString(node.address)})">${esc(node.address)}</div>
          <div class="trace-node-panel-filter ${isAssetEmpty ? 'empty' : ''}">${filterLabel}${isAssetEmpty ? ' · связей нет' : ''}</div>
        </div>
        <button class="btn-icon" onclick="closeTraceNodeDetails()">✕</button>
      </div>
      ${missingAssetNote}
      <div class="detail-grid" style="margin-bottom:10px">
        <div class="detail-label">Получено${normalizedAssetFilter !== 'all' ? ` · ${esc(normalizedAssetFilter)}` : ''}</div><div class="detail-value">${formatTraceRows(incomingSummary, 'Входящих связей нет')}</div>
        <div class="detail-label">Отправлено${normalizedAssetFilter !== 'all' ? ` · ${esc(normalizedAssetFilter)}` : ''}</div><div class="detail-value">${formatTraceRows(outgoingSummary, 'Исходящих связей нет')}</div>
        <div class="detail-label">Связи</div><div class="detail-value">${incoming.length} входящих · ${outgoing.length} исходящих</div>
        <div class="detail-label">Проверка</div><div class="detail-value">${node.fetched ? `проверено ${node.tx_count || 0} транз.` : 'адрес не проверялся как следующий переход'}</div>
      </div>
      <div class="trace-node-panel-section incoming">
        <h4>Входящие связи: кто отправил на этот адрес</h4>
        ${renderTraceNodeEdgeList(incoming, 'Входящих связей в текущем графе нет.')}
      </div>
      <div class="trace-node-panel-section outgoing">
        <h4>Исходящие связи: куда этот адрес отправил дальше</h4>
        ${renderTraceNodeEdgeList(outgoing, 'Исходящих связей в текущем графе нет.')}
      </div>
      ${hiddenLabel}
      <div class="trace-note">Клик по строке связи откроет полные детали агрегированной связи. Если транзакций больше одной, строка объединяет несколько переводов между этой парой адресов.</div>
    </div>`;
}

function getTraceRootNode(result) {
  return (result?.nodes || []).find(node => node.root) || (result?.nodes || [])[0] || null;
}

function sortTraceEdges(edges) {
  return [...edges].sort((a, b) => {
    const valueDiff = traceEdgeValue(b) - traceEdgeValue(a);
    if (valueDiff) return valueDiff;
    return String(b.last_seen || '').localeCompare(String(a.last_seen || ''));
  });
}

function getTraceNodeEdges(result, nodeId, direction) {
  const edges = result?.edges || [];
  const filtered = direction === 'incoming'
    ? edges.filter(edge => edge.to === nodeId)
    : edges.filter(edge => edge.from === nodeId);
  return sortTraceEdges(filtered);
}

function getTraceStepRemaining(result, nodeId, direction) {
  const shown = new Set(state.traceStepEdgeIds || []);
  return getTraceNodeEdges(result, nodeId, direction).filter(edge => !shown.has(edge.id)).length;
}

function expandTraceStep(nodeId, direction) {
  const result = state.traceResult;
  if (!result) return;

  const shown = new Set(state.traceStepEdgeIds || []);
  const nextEdge = getTraceNodeEdges(result, nodeId, direction).find(edge => !shown.has(edge.id));
  if (!nextEdge) {
    toast(direction === 'incoming' ? 'Входящих связей для раскрытия больше нет' : 'Исходящих связей для раскрытия больше нет', 'error');
    return;
  }

  state.traceStepEdgeIds = [...(state.traceStepEdgeIds || []), nextEdge.id];
  state.traceNodeDetailId = direction === 'incoming' ? nextEdge.from : nextEdge.to;
  state.traceNodeDetailScope = 'step';
  state.traceNodeDetailAsset = 'all';
  rerender();
}

function resetTraceStep() {
  state.traceStepEdgeIds = [];
  state.traceNodeDetailId = null;
  state.traceNodeDetailScope = 'graph';
  state.traceNodeDetailAsset = 'all';
  state.traceStepView = { scale: 1, x: 0, y: 0 };
  rerender();
}

function buildTraceStepLayout(result) {
  const root = getTraceRootNode(result);
  if (!root) return { root: null, nodes: [], edges: [], positions: {}, width: 980, height: 520 };

  const nodesById = new Map((result.nodes || []).map(node => [node.id, node]));
  const edgesById = new Map((result.edges || []).map(edge => [edge.id, edge]));
  const revealedEdges = (state.traceStepEdgeIds || []).map(id => edgesById.get(id)).filter(Boolean);
  const visibleNodes = new Map([[root.id, root]]);
  const nodeColumns = new Map([[root.id, 0]]);

  revealedEdges.forEach(edge => {
    const fromVisible = visibleNodes.has(edge.from);
    const toVisible = visibleNodes.has(edge.to);

    if (fromVisible && !toVisible && nodesById.has(edge.to)) {
      visibleNodes.set(edge.to, nodesById.get(edge.to));
      nodeColumns.set(edge.to, (nodeColumns.get(edge.from) || 0) + 1);
    }
    if (toVisible && !fromVisible && nodesById.has(edge.from)) {
      visibleNodes.set(edge.from, nodesById.get(edge.from));
      nodeColumns.set(edge.from, (nodeColumns.get(edge.to) || 0) - 1);
    }
  });

  const visibleEdges = revealedEdges.filter(edge => visibleNodes.has(edge.from) && visibleNodes.has(edge.to));
  const columns = new Map();
  visibleNodes.forEach(node => {
    const col = nodeColumns.get(node.id) || 0;
    if (!columns.has(col)) columns.set(col, []);
    columns.get(col).push(node);
  });

  const colKeys = [...columns.keys()].sort((a, b) => a - b);
  const minCol = Math.min(0, ...colKeys);
  const maxRows = Math.max(1, ...colKeys.map(col => columns.get(col).length));
  const expanded = !!state.traceStepExpanded;
  const edgeCount = visibleEdges.length;
  const colGap = (expanded ? 500 : 370) + Math.min(expanded ? 280 : 130, Math.max(0, edgeCount - 3) * (expanded ? 12 : 5));
  const rowGap = (expanded ? 236 : 178) + Math.min(expanded ? 150 : 76, Math.max(0, maxRows - 3) * (expanded ? 18 : 9));
  const sidePadding = expanded ? 380 : 250;
  const topPadding = expanded ? 210 : 132;
  const positions = {};

  colKeys.forEach(col => {
    const colNodes = columns.get(col);
    const offset = (maxRows - colNodes.length) * rowGap / 2;
    colNodes.forEach((node, index) => {
      positions[node.id] = {
        x: sidePadding + (col - minCol) * colGap,
        y: topPadding + offset + index * rowGap,
      };
    });
  });

  return {
    root,
    nodes: [...visibleNodes.values()],
    edges: visibleEdges,
    positions,
    width: Math.max(expanded ? 2400 : 1080, sidePadding * 2 + (Math.max(...colKeys) - minCol) * colGap),
    height: Math.max(expanded ? 1320 : 680, topPadding * 2 + maxRows * rowGap),
  };
}

function renderTraceStepNode(node, position, result) {
  const incomingLeft = getTraceStepRemaining(result, node.id, 'incoming');
  const outgoingLeft = getTraceStepRemaining(result, node.id, 'outgoing');
  const incomingAll = getTraceNodeEdges(result, node.id, 'incoming').length;
  const outgoingAll = getTraceNodeEdges(result, node.id, 'outgoing').length;
  const selected = state.traceNodeDetailId === node.id;
  return `
    <div class="trace-step-node ${node.root ? 'root' : ''} ${selected ? 'selected' : ''}" style="left:calc(${position.x}px * var(--trace-scale));top:calc(${position.y}px * var(--trace-scale))" onclick="openTraceNodeDetails(${jsString(node.id)}, 'step')">
      <button class="trace-step-plus left ${incomingLeft ? '' : 'disabled'}" title="Показать входящий адрес" onclick="event.stopPropagation();expandTraceStep(${jsString(node.id)}, 'incoming')">
        +
        ${incomingLeft ? `<span class="trace-step-count">${incomingLeft}</span>` : ''}
      </button>
      <button class="trace-step-plus right ${outgoingLeft ? '' : 'disabled'}" title="Показать исходящий адрес" onclick="event.stopPropagation();expandTraceStep(${jsString(node.id)}, 'outgoing')">
        +
        ${outgoingLeft ? `<span class="trace-step-count">${outgoingLeft}</span>` : ''}
      </button>
      <div class="trace-step-title">${node.root ? 'Исходный кошелёк' : node.source_only ? 'Источник' : 'Адрес'}</div>
      <div class="trace-step-address">${shortAddr(node.address)}</div>
      <div class="trace-step-sub">${incomingAll} вход · ${outgoingAll} исход</div>
    </div>`;
}

function renderTraceStepExplorer(result, isLoading) {
  if (isLoading) return '';
  if (!result || !result.nodes?.length) {
    return `
      <div class="card" style="margin-bottom:14px">
        <div class="card-header"><div class="card-title">Пошаговое раскрытие связей</div></div>
        <div class="trace-step-empty">Постройте граф, после этого здесь можно будет раскрывать связи плюсами.</div>
      </div>`;
  }

  const layout = buildTraceStepLayout(result);
  const anchorOffsets = buildTraceAnchorOffsets(
    layout.edges,
    layout.positions,
    state.traceStepExpanded ? 20 : 13,
    state.traceStepExpanded ? 82 : 54,
  );
  const edgePaths = layout.edges.map(edge => {
    const from = layout.positions[edge.from];
    const to = layout.positions[edge.to];
    if (!from || !to) return '';
    const direction = to.x >= from.x ? 1 : -1;
    const fromX = from.x + direction * 110;
    const toX = to.x - direction * 110;
    const sourceOffset = anchorOffsets.source.get(edge.id) || 0;
    const targetOffset = anchorOffsets.target.get(edge.id) || 0;
    const curve = Math.max(state.traceStepExpanded ? 120 : 86, Math.abs(to.x - from.x) * 0.42);
    const points = [
      { x: fromX, y: from.y },
      { x: fromX + direction * curve, y: from.y + sourceOffset },
      { x: toX - direction * curve, y: to.y + targetOffset },
      { x: toX, y: to.y },
    ];
    const path = cubicPath(points);
    const tailPath = cubicTailPath(points, 0.66);
    const color = edge.direction === 'incoming' ? 'rgba(96,165,250,0.72)' : 'rgba(108,99,255,0.82)';
    const baseColor = edge.direction === 'incoming' ? 'rgba(148,163,184,0.48)' : 'rgba(148,163,184,0.55)';
    const width = state.traceStepExpanded ? 2.4 : 1.9;
    return `
      <g class="trace-step-edge" onmousedown="event.stopPropagation()" onclick="openTraceEdgeDetails(${jsString(edge.id)})">
        <title>${fmtTraceNumber(edge.amount, 6)} ${esc(edge.asset)} · ${edge.tx_count} транз.</title>
        <path class="trace-step-edge-hit" d="${path}"></path>
        <path class="trace-step-edge-base" d="${path}" stroke="${baseColor}"></path>
        <path class="trace-step-edge-tail" d="${tailPath}" stroke="${color}" stroke-width="${width}" marker-end="url(#traceStepArrow)"></path>
      </g>`;
  }).join('');

  const edgeLabels = layout.edges.map(edge => {
    const from = layout.positions[edge.from];
    const to = layout.positions[edge.to];
    if (!from || !to) return '';
    const sourceOffset = anchorOffsets.source.get(edge.id) || 0;
    const targetOffset = anchorOffsets.target.get(edge.id) || 0;
    const x = (from.x + to.x) / 2;
    const y = (from.y + sourceOffset + to.y + targetOffset) / 2;
    return `
      <div class="trace-step-tx-label" style="left:calc(${x}px * var(--trace-scale));top:calc(${y}px * var(--trace-scale))" onmousedown="event.stopPropagation()" onclick="openTraceEdgeDetails(${jsString(edge.id)})">
        <div class="trace-step-tx-amount">${fmtTraceNumber(edge.amount, 4)} ${esc(edge.asset)}</div>
        <div class="trace-step-tx-date">${fmtDate(edge.first_seen)}</div>
      </div>`;
  }).join('');

  const nodes = layout.nodes.map(node => renderTraceStepNode(node, layout.positions[node.id], result)).join('');
  const nodePanel = state.traceNodeDetailScope === 'step'
    ? renderTraceNodeDetailsPanel(result, state.traceNodeDetailId)
    : '';

  return `
    ${state.traceStepExpanded ? '<div class="trace-expand-backdrop" onclick="toggleTraceStepExpanded(false)"></div>' : ''}
    <div class="card trace-step-card ${state.traceStepExpanded ? 'expanded' : ''}" style="margin-bottom:14px">
      <div class="card-header">
        <div>
          <div class="card-title">Пошаговое раскрытие связей</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">Слева + показывает кто отправил на адрес, справа + показывает куда адрес отправил дальше.</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-ghost btn-sm" onclick="toggleTraceStepExpanded()">${state.traceStepExpanded ? 'Свернуть' : 'Развернуть'}</button>
          <button class="btn btn-ghost btn-sm" onclick="resetTraceStep()" ${state.traceStepEdgeIds?.length ? '' : 'disabled'}>Сбросить</button>
        </div>
      </div>
      <div class="card-body">
        <div class="trace-step-viewport" onwheel="handleTraceStepWheel(event)" onmousedown="startTraceStepPan(event)">
          <div class="trace-step-stage" style="--trace-scale:${state.traceStepView.scale};left:${state.traceStepView.x}px;top:${state.traceStepView.y}px;width:calc(${layout.width}px * var(--trace-scale));height:calc(${layout.height}px * var(--trace-scale))">
            <svg class="trace-step-svg" viewBox="0 0 ${layout.width} ${layout.height}" preserveAspectRatio="none">
              <defs>
                <marker id="traceStepArrow" markerWidth="5" markerHeight="5" refX="4.55" refY="2.5" orient="auto" markerUnits="userSpaceOnUse">
                  <path d="M0,0 L5,2.5 L0,5 Z" fill="rgba(203,213,225,0.88)"></path>
                </marker>
              </defs>
              ${edgePaths}
            </svg>
            ${edgeLabels}
            ${nodes}
          </div>
          ${nodePanel}
          <div class="trace-zoom-hint">колесо: масштаб · зажать и тянуть: перемещение</div>
        </div>
      </div>
    </div>`;
}

function renderTraceGraph(result) {
  if (!result || !result.nodes?.length) {
    return `
      <div class="empty">
        <div class="empty-icon">▧</div>
        <div class="empty-title">Маршрут ещё не построен</div>
        <div class="empty-sub">Выберите TRON-кошелёк и нажмите “Построить”.</div>
      </div>`;
  }

  const layout = buildTraceGraphLayout(result);
  const selectedNodeId = state.traceNodeDetailScope !== 'step' && state.traceNodeDetailId && layout.nodes.some(node => node.id === state.traceNodeDetailId)
    ? state.traceNodeDetailId
    : null;
  const maxEdgeValue = Math.max(1, ...layout.edges.map(traceEdgeValue));
  const anchorOffsets = buildTraceAnchorOffsets(
    layout.edges,
    layout.positions,
    state.traceExpanded ? 18 : 12,
    state.traceExpanded ? 86 : 58,
  );
  const edgePaths = layout.edges.map(edge => {
    const from = layout.positions[edge.from];
    const to = layout.positions[edge.to];
    if (!from || !to) return '';
    const width = Math.max(1.1, Math.min(3.1, 1.05 + Math.sqrt(traceEdgeValue(edge) / maxEdgeValue) * 2.05));
    const direction = to.x >= from.x ? 1 : -1;
    const sourceOffset = anchorOffsets.source.get(edge.id) || 0;
    const targetOffset = anchorOffsets.target.get(edge.id) || 0;
    const curve = Math.max(state.traceExpanded ? 170 : 126, Math.abs(to.x - from.x) * 0.44);
    const fromX = from.x + direction * 142;
    const toX = to.x - direction * 142;
    const points = [
      { x: fromX, y: from.y },
      { x: fromX + direction * curve, y: from.y + sourceOffset },
      { x: toX - direction * curve, y: to.y + targetOffset },
      { x: toX, y: to.y },
    ];
    const path = cubicPath(points);
    const tailPath = cubicTailPath(points, 0.66);
    const color = edge.direction === 'incoming'
      ? 'rgba(96,165,250,0.78)'
      : edge.asset === 'USDT'
      ? 'rgba(34,211,165,0.74)'
      : 'rgba(108,99,255,0.76)';
    const baseColor = edge.direction === 'incoming'
      ? 'rgba(148,163,184,0.43)'
      : 'rgba(148,163,184,0.52)';
    const isFocused = traceEdgeConnectedTo(edge, selectedNodeId);
    const edgeClass = [
      'trace-edge-click',
      edge.direction === 'incoming' ? 'trace-edge-context' : '',
      selectedNodeId && !isFocused ? 'trace-edge-dim' : '',
      isFocused ? 'trace-edge-selected' : '',
    ].filter(Boolean).join(' ');
    return `
      <g class="${edgeClass}" onmousedown="event.stopPropagation()" onclick="openTraceEdgeDetails(${jsString(edge.id)})">
        <title>${fmtTraceNumber(edge.amount, 6)} ${esc(edge.asset)} · ${edge.tx_count} транз. · ${esc(edgePurpose(edge))}</title>
        <path class="trace-edge-hit" d="${path}"></path>
        <path class="trace-edge-base" d="${path}" stroke="${baseColor}"></path>
        <path class="trace-edge-tail" d="${tailPath}" stroke="${color}" stroke-width="${width.toFixed(2)}" marker-end="url(#traceArrow)"></path>
      </g>`;
  }).join('');

  const sortedLabelEdges = [...layout.edges].sort((a, b) => traceEdgeValue(b) - traceEdgeValue(a));
  const labelLimit = state.traceExpanded ? 140 : 90;
  const labeledEdgeIds = new Set(sortedLabelEdges.slice(0, labelLimit).map(edge => edge.id));
  const edgeLabels = layout.edges.map(edge => {
    if (!labeledEdgeIds.has(edge.id) && !traceEdgeConnectedTo(edge, selectedNodeId)) return '';
    const from = layout.positions[edge.from];
    const to = layout.positions[edge.to];
    if (!from || !to) return '';
    const sourceOffset = anchorOffsets.source.get(edge.id) || 0;
    const targetOffset = anchorOffsets.target.get(edge.id) || 0;
    const x = (from.x + to.x) / 2;
    const y = (from.y + sourceOffset + to.y + targetOffset) / 2 - 14;
    const isFocused = traceEdgeConnectedTo(edge, selectedNodeId);
    const labelClass = [
      'trace-edge-label',
      selectedNodeId && !isFocused ? 'dim' : '',
      isFocused ? 'selected' : '',
    ].filter(Boolean).join(' ');
    return `<div class="${labelClass}" style="left:${x}px;top:${y}px" onmousedown="event.stopPropagation()" onclick="openTraceEdgeDetails(${jsString(edge.id)})">${fmtTraceNumber(edge.amount, 4)} ${esc(edge.asset)}</div>`;
  }).join('');

  const outgoingByNode = buildTraceRowsFromEdges(layout.edges, 'from');
  const nodeCards = layout.nodes.map(node => {
    const rows = [...(outgoingByNode.get(node.id)?.values() || [])];
    return renderTraceNode(node, layout.positions[node.id], rows);
  }).join('');
  const nodePanel = state.traceNodeDetailScope === 'step'
    ? ''
    : renderTraceNodeDetailsPanel(result, selectedNodeId);

  return `
    <div class="trace-graph-viewport" onwheel="handleTraceWheel(event)" onmousedown="startTracePan(event)">
      <div class="trace-graph-stage" data-width="${layout.width}" data-height="${layout.height}" style="--trace-scale:${state.traceView.scale};--trace-node-scale:${traceNodeScale(state.traceView.scale)};left:${state.traceView.x}px;top:${state.traceView.y}px;width:${layout.width}px;height:${layout.height}px">
        <svg class="trace-edge-layer" viewBox="0 0 ${layout.width} ${layout.height}" preserveAspectRatio="none">
          <defs>
            <marker id="traceArrow" markerWidth="5" markerHeight="5" refX="4.55" refY="2.5" orient="auto" markerUnits="userSpaceOnUse">
              <path d="M0,0 L5,2.5 L0,5 Z" fill="rgba(203,213,225,0.88)"></path>
            </marker>
          </defs>
          ${edgePaths}
        </svg>
        ${edgeLabels}
        ${nodeCards}
      </div>
      ${nodePanel}
      <div class="trace-zoom-hint">колесо: масштаб · зажать и тянуть: перемещение</div>
    </div>`;
}

function getTraceTotals(result, scope = 'graph') {
  const rootAddress = String(result?.address || '').toLowerCase();
  const totals = new Map();
  (result?.edges || []).forEach(edge => {
    if (scope === 'root') {
      const checked = String(edge.checked_address || '').toLowerCase();
      if (checked !== rootAddress) return;
    }
    const row = totals.get(edge.asset) || { asset: edge.asset, amount: 0, usd: 0, tx: 0, edges: 0 };
    row.amount += Number(edge.amount || 0);
    row.usd += Number(edge.usd_value || 0);
    row.tx += Number(edge.tx_count || 0);
    row.edges += 1;
    totals.set(edge.asset, row);
  });
  return [...totals.values()].sort((a, b) => b.usd - a.usd || b.amount - a.amount);
}

function getTraceGraphAssetOptions(result) {
  return getTraceTotals(result, 'graph').map(row => row.asset);
}

function traceSortValue(row) {
  const usd = Number(row.usd || 0);
  return usd > 0 ? usd : Number(row.amount || 0);
}

function setTraceTableFilter(key, value) {
  if (key === 'emptyOnly') {
    state.traceTableFilter.emptyOnly = Boolean(value);
  } else {
    state.traceTableFilter[key] = value;
  }
  rerender();
}

function focusTraceNode(nodeId, asset = 'all', missingAsset = '') {
  state.traceNodeDetailId = nodeId;
  state.traceNodeDetailScope = 'graph';
  state.traceNodeDetailAsset = asset || 'all';
  state.traceNodeDetailMissingAsset = missingAsset || '';
  rerender();
  setTimeout(() => {
    document.querySelector('.trace-graph-card')?.scrollIntoView({ block: 'start', behavior: 'smooth' });
  }, 0);
}

function getTraceNodeFlowRows(result, assetFilter = 'all') {
  const nodesById = new Map((result?.nodes || []).map(node => [node.id, {
    ...node,
    inAmount: 0,
    outAmount: 0,
    amount: 0,
    usd: 0,
    tx: 0,
    assets: new Set(),
  }]));

  (result?.edges || []).forEach(edge => {
    const asset = String(edge.asset || 'UNKNOWN');
    if (assetFilter !== 'all' && asset !== assetFilter) return;
    const amount = Number(edge.amount || 0);
    const usd = Number(edge.usd_value || 0);
    const tx = Number(edge.tx_count || 0);
    const from = nodesById.get(edge.from);
    const to = nodesById.get(edge.to);

    if (from) {
      from.outAmount += amount;
      from.amount += amount;
      from.usd += usd;
      from.tx += tx;
      from.assets.add(asset);
    }
    if (to) {
      to.inAmount += amount;
      to.amount += amount;
      to.usd += usd;
      to.tx += tx;
      to.assets.add(asset);
    }
  });

  return [...nodesById.values()].map(node => ({
    ...node,
    assets: [...node.assets].sort(),
    empty: Number(node.amount || 0) <= 0,
  }));
}

function renderTraceAssetOverview(result, totals) {
  if (!result || !totals.length) return '';
  const totalUsd = totals.reduce((sum, row) => sum + Number(row.usd || 0), 0);
  const totalTx = totals.reduce((sum, row) => sum + Number(row.tx || 0), 0);
  return `
    <div class="trace-asset-grid">
      <div class="trace-asset-card" style="border-color:rgba(108,99,255,0.32)">
        <div class="trace-asset-card-head">
          <span class="trace-asset-symbol">Итого</span>
          <span class="trace-asset-rank">${totals.length} активов</span>
        </div>
        <div class="trace-asset-amount">${fmtTraceUsdt(totalUsd)}</div>
        <div class="trace-asset-usd">примерный общий оборот по связям</div>
        <div class="trace-asset-meta"><span>${totalTx} транз.</span><span>${result.edges?.length || 0} связей</span></div>
      </div>
      ${totals.map((row, index) => `
        <div class="trace-asset-card">
          <div class="trace-asset-card-head">
            <span class="trace-asset-symbol">${esc(row.asset)}</span>
            <span class="trace-asset-rank">#${index + 1}</span>
          </div>
          <div class="trace-asset-amount">${fmtTraceNumber(row.amount, 6)} ${esc(row.asset)}</div>
          <div class="trace-asset-usd">≈ ${fmtTraceUsdt(row.usd)}</div>
          <div class="trace-asset-meta"><span>${row.tx} транз.</span><span>${row.edges} связей</span></div>
        </div>
      `).join('')}
    </div>`;
}

function renderTraceWalletFilterPanel(result, assetOptions) {
  if (!result || !result.nodes?.length) return '';
  const filter = state.traceTableFilter || { asset: 'all', sort: 'desc', emptyOnly: false };
  const selectedAsset = filter.asset === 'all' || assetOptions.includes(filter.asset) ? filter.asset : 'all';
  if (selectedAsset !== filter.asset) state.traceTableFilter.asset = selectedAsset;

  const sort = filter.sort === 'asc' ? 'asc' : 'desc';
  const rows = getTraceNodeFlowRows(result, selectedAsset)
    .filter(row => !filter.emptyOnly || row.empty)
    .sort((a, b) => {
      const diff = traceSortValue(a) - traceSortValue(b) || Number(a.amount || 0) - Number(b.amount || 0) || String(a.address).localeCompare(String(b.address));
      return sort === 'asc' ? diff : -diff;
    });
  const shownRows = rows.slice(0, 36);
  const title = filter.emptyOnly
    ? selectedAsset === 'all'
      ? 'Пустые адреса'
      : `Адреса без ${selectedAsset}`
    : 'Адреса по фильтру';

  return `
    <div class="trace-wallet-filter-panel">
      <div class="trace-wallet-filter-head">
        <div>
          <strong style="color:var(--text)">${title}</strong>
          <span style="margin-left:8px">${rows.length} из ${result.nodes.length}</span>
        </div>
        <div style="color:var(--text3)">нажмите на адрес, чтобы открыть его в графе</div>
      </div>
      <div class="trace-wallet-list">
        ${shownRows.length ? shownRows.map(node => {
          const value = selectedAsset === 'all'
            ? `${fmtTraceNumber(node.amount, 4)} всего`
            : `${fmtTraceNumber(node.amount, 4)} ${esc(selectedAsset)}`;
          const usd = Number(node.usd || 0) > 0 ? ` · ≈ ${fmtTraceUsdt(node.usd)}` : '';
          const assets = node.assets.length ? node.assets.join(', ') : 'нет активов';
          const flowClass = node.empty
            ? 'empty'
            : node.inAmount > node.outAmount
            ? 'flow-in'
            : node.outAmount > node.inAmount
            ? 'flow-out'
            : 'flow-mixed';
          const tag = node.empty
            ? selectedAsset === 'all'
              ? '<span class="trace-wallet-tag empty">пустой в графе</span>'
              : `<span class="trace-wallet-tag empty">нет ${esc(selectedAsset)}</span>`
            : node.inAmount > node.outAmount
            ? '<span class="trace-wallet-tag in">входящий перевес</span>'
            : node.outAmount > node.inAmount
            ? '<span class="trace-wallet-tag out">исходящий перевес</span>'
            : '<span class="trace-wallet-tag">смешанный</span>';
          const assetTag = selectedAsset === 'all'
            ? '<span class="trace-wallet-tag">все активы</span>'
            : `<span class="trace-wallet-tag">${esc(selectedAsset)}</span>`;
          const detailAsset = node.empty && selectedAsset !== 'all' ? 'all' : selectedAsset;
          const missingAsset = node.empty && selectedAsset !== 'all' ? selectedAsset : '';
          return `
            <div class="trace-wallet-row ${flowClass}" onclick="focusTraceNode(${jsString(node.id)}, ${jsString(detailAsset)}, ${jsString(missingAsset)})">
              <div class="trace-wallet-main">
                <span class="trace-wallet-address">${shortAddr(node.address)}</span>
                <span class="trace-wallet-value">${value}</span>
              </div>
              <div class="trace-wallet-meta">
                вход ${fmtTraceNumber(node.inAmount, 4)} · исход ${fmtTraceNumber(node.outAmount, 4)}${usd}<br/>
                ${node.root ? 'стартовый · ' : ''}${node.source_only ? 'источник · ' : ''}${assets}
              </div>
              <div class="trace-wallet-tags">${tag}${assetTag}</div>
            </div>`;
        }).join('') : `<div class="trace-step-empty" style="grid-column:1/-1">Под этот фильтр адресов нет.</div>`}
      </div>
      ${rows.length > shownRows.length ? `<div class="trace-note">Показаны первые ${shownRows.length} адресов. Уточните актив или сортировку, чтобы сузить список.</div>` : ''}
    </div>`;
}

function renderTraceTable(result) {
  const edges = result?.edges || [];
  if (!edges.length) return '';
  const assetOptions = getTraceGraphAssetOptions(result);
  const filter = state.traceTableFilter || { asset: 'all', sort: 'desc', emptyOnly: false };
  const selectedAsset = filter.asset === 'all' || assetOptions.includes(filter.asset) ? filter.asset : 'all';
  if (selectedAsset !== filter.asset) state.traceTableFilter.asset = selectedAsset;
  const sort = filter.sort === 'asc' ? 'asc' : 'desc';
  const tableEdges = edges
    .filter(edge => selectedAsset === 'all' || edge.asset === selectedAsset)
    .sort((a, b) => {
      const diff = traceEdgeValue(a) - traceEdgeValue(b) || Number(a.amount || 0) - Number(b.amount || 0) || String(a.id).localeCompare(String(b.id));
      return sort === 'asc' ? diff : -diff;
    });
  const emptyButtonLabel = selectedAsset === 'all' ? 'Пустые кошельки' : `Без ${selectedAsset}`;
  return `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Связи по кошелькам</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">${sort === 'desc' ? 'от большего к меньшему' : 'от меньшего к большему'} · ${selectedAsset === 'all' ? 'все активы' : selectedAsset}</div>
        </div>
        <div class="trace-table-tools">
          <select class="form-select" onchange="setTraceTableFilter('sort', this.value)">
            <option value="desc" ${sort==='desc'?'selected':''}>Больше → меньше</option>
            <option value="asc" ${sort==='asc'?'selected':''}>Меньше → больше</option>
          </select>
          <select class="form-select" onchange="setTraceTableFilter('asset', this.value)">
            <option value="all" ${selectedAsset==='all'?'selected':''}>Все активы</option>
            ${assetOptions.map(asset => `<option value="${asset}" ${selectedAsset===asset?'selected':''}>${esc(asset)}</option>`).join('')}
          </select>
          <button class="btn btn-ghost btn-sm ${filter.emptyOnly ? 'active' : ''}" onclick="setTraceTableFilter('emptyOnly', ${filter.emptyOnly ? 'false' : 'true'})">${esc(emptyButtonLabel)}</button>
        </div>
      </div>
      ${renderTraceWalletFilterPanel(result, assetOptions)}
      <div class="table-wrap">
        <table class="trace-table">
          <thead><tr><th>Откуда</th><th>Куда</th><th>Связь</th><th>Актив</th><th>Сумма</th><th>≈ USDT</th><th>Зачем / метод</th><th>Транзакции</th><th>Период</th></tr></thead>
          <tbody>
            ${tableEdges.length ? tableEdges.map(edge => `
              <tr class="tx-row" onclick="openTraceEdgeDetails(${jsString(edge.id)})">
                <td><span class="addr addr-short" onclick="event.stopPropagation();copyAddr(${jsString(edge.from_address)})">${shortAddr(edge.from_address)}</span></td>
                <td><span class="addr addr-short" onclick="event.stopPropagation();copyAddr(${jsString(edge.to_address)})">${shortAddr(edge.to_address)}</span></td>
                <td>${edge.direction === 'incoming' ? '<span class="badge badge-in">Входящая</span>' : '<span class="badge badge-out">Исходящая</span>'}</td>
                <td><span class="asset-chip">${esc(edge.asset)}</span></td>
                <td class="mono">${fmtTraceNumber(edge.amount, 6)}</td>
                <td>${fmtTraceUsdt(edge.usd_value)}</td>
                <td style="color:var(--text2);font-size:12px">${esc(edgePurpose(edge))}</td>
                <td>${edge.tx_count}</td>
                <td style="color:var(--text2);font-size:12px">${fmtDate(edge.first_seen)}<br/>${fmtDate(edge.last_seen)}</td>
              </tr>`).join('') : `
              <tr>
                <td colspan="9" style="text-align:center;color:var(--text3);padding:26px">Связей для выбранного актива нет.</td>
              </tr>`}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderTraceEdgeDetailsModal() {
  const edge = state.traceEdgeDetailId ? getTraceEdgeById(state.traceEdgeDetailId) : null;
  if (!edge) return '';

  const hashes = (edge.hashes || []).filter(Boolean);
  const hashRows = hashes.map(hash => {
    const url = `https://tronscan.org/#/transaction/${encodeURIComponent(hash)}`;
    return `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span class="addr mono" style="flex:1;min-width:0;overflow-wrap:anywhere" onclick="copyAddr(${jsString(hash)})">${esc(hash)}</span>
        <a class="btn btn-ghost btn-sm" href="${url}" target="_blank" rel="noopener noreferrer">Tronscan</a>
      </div>`;
  }).join('');
  const hashNote = Number(edge.tx_count || 0) > hashes.length && hashes.length
    ? `<div style="color:var(--text3);font-size:11px;margin-top:6px">Показано ${hashes.length} из ${edge.tx_count} хэшей этой агрегированной связи.</div>`
    : '';
  const directionText = edge.direction === 'incoming'
    ? 'Входящая для проверенного адреса'
    : 'Исходящая из проверенного адреса';
  const period = edge.first_seen || edge.last_seen
    ? `${fmtDate(edge.first_seen)} → ${fmtDate(edge.last_seen)}`
    : '—';

  return `
  <div class="modal-overlay ${state.modal === 'traceEdgeDetails' ? 'open' : ''}" onclick="closeModal(event)">
    <div class="modal modal-wide">
      <div class="modal-header">
        <div>
          <div class="modal-title">Детали связи в графе</div>
          <div class="addr mono" style="margin-top:4px">${shortAddr(edge.from_address)} → ${shortAddr(edge.to_address)}</div>
        </div>
        <button class="btn-icon" onclick="closeActiveModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="detail-grid">
          <div class="detail-label">Тип</div><div class="detail-value">${directionText}</div>
          <div class="detail-label">Проверенный адрес</div><div class="detail-value mono">${edge.checked_address || '—'}</div>
          <div class="detail-label">Отправитель</div><div class="detail-value mono"><span class="addr" onclick="copyAddr(${jsString(edge.from_address)})">${esc(edge.from_address)}</span></div>
          <div class="detail-label">Получатель</div><div class="detail-value mono"><span class="addr" onclick="copyAddr(${jsString(edge.to_address)})">${esc(edge.to_address)}</span></div>
          <div class="detail-label">Сумма</div><div class="detail-value"><strong>${fmtTraceNumber(edge.amount, 6)} ${esc(edge.asset)}</strong></div>
          <div class="detail-label">≈ USDT</div><div class="detail-value">${fmtTraceUsdt(edge.usd_value)}</div>
          <div class="detail-label">Транзакций</div><div class="detail-value">${edge.tx_count || 0}</div>
          <div class="detail-label">Период</div><div class="detail-value">${period}</div>
          <div class="detail-label">Зачем / метод</div><div class="detail-value">${esc(edgePurpose(edge))}</div>
          <div class="detail-label">Тип операции</div><div class="detail-value">${(edge.tx_types || []).map(esc).join(', ') || 'перевод'}</div>
          <div class="detail-label">Хэш транзакции</div><div class="detail-value">${hashRows || '—'}${hashNote}</div>
        </div>
        <div class="trace-note">Если тут больше одной транзакции, связь агрегирует несколько переводов между этими двумя адресами за выбранный период.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="copyAddr(${jsString(edge.from_address)})">Скопировать отправителя</button>
        <button class="btn btn-ghost" onclick="copyAddr(${jsString(edge.to_address)})">Скопировать получателя</button>
        <button class="btn btn-primary" onclick="closeActiveModal()">Закрыть</button>
      </div>
    </div>
  </div>`;
}

function readTutorialSeen() {
  try {
    return JSON.parse(localStorage.getItem(TUTORIAL_SEEN_KEY) || '{}') || {};
  } catch (error) {
    return {};
  }
}

function markTutorialSeen(page) {
  const seen = readTutorialSeen();
  seen[page] = true;
  localStorage.setItem(TUTORIAL_SEEN_KEY, JSON.stringify(seen));
}

function shouldAutoOpenTutorial(page) {
  return Boolean(TUTORIALS[page]) && !readTutorialSeen()[page];
}

function startTutorial(page = state.page, auto = false) {
  if (!TUTORIALS[page]) return;
  state.tutorial = { open: true, page, step: 0, auto: Boolean(auto) };
  markTutorialSeen(page);
  rerender();
}

function closeTutorial() {
  state.tutorial = { open: false, page: null, step: 0 };
  rerender();
}

function setTutorialStep(delta) {
  const page = state.tutorial.page || state.page;
  const tutorial = TUTORIALS[page];
  if (!tutorial) return;
  const max = tutorial.steps.length - 1;
  state.tutorial.step = Math.max(0, Math.min(max, Number(state.tutorial.step || 0) + delta));
  rerender();
}

function renderTutorialLauncher() {
  if (!TUTORIALS[state.page]) return '';
  return `<button class="btn btn-primary tutorial-launcher" onclick="startTutorial('${state.page}')">Обучение</button>`;
}

function renderTutorialOverlay() {
  if (!state.tutorial.open) return '';
  const page = state.tutorial.page || state.page;
  const tutorial = TUTORIALS[page];
  if (!tutorial) return '';
  const stepIndex = Math.max(0, Math.min(Number(state.tutorial.step || 0), tutorial.steps.length - 1));
  const [stepTitle, stepText] = tutorial.steps[stepIndex];
  const isLast = stepIndex >= tutorial.steps.length - 1;
  return `
    <div class="tutorial-backdrop" onclick="closeTutorial()">
      <div class="tutorial-panel" onclick="event.stopPropagation()">
        <div class="tutorial-head">
          <div>
            <div class="tutorial-kicker">Обучение · шаг ${stepIndex + 1} из ${tutorial.steps.length}</div>
            <div class="tutorial-title">${esc(tutorial.title)}</div>
          </div>
          <button class="btn-icon" onclick="closeTutorial()">✕</button>
        </div>
        <div class="tutorial-body">
          <div class="tutorial-step-title">${esc(stepTitle)}</div>
          <div class="tutorial-step-text">${esc(stepText)}</div>
          <div class="tutorial-dots">
            ${tutorial.steps.map((_, index) => `<span class="tutorial-dot ${index === stepIndex ? 'active' : ''}"></span>`).join('')}
          </div>
        </div>
        <div class="tutorial-actions">
          <button class="btn btn-ghost" onclick="setTutorialStep(-1)" ${stepIndex === 0 ? 'disabled' : ''}>Назад</button>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" onclick="closeTutorial()">Закрыть</button>
            <button class="btn btn-primary" onclick="${isLast ? 'closeTutorial()' : 'setTutorialStep(1)'}">${isLast ? 'Готово' : 'Далее'}</button>
          </div>
        </div>
      </div>
    </div>`;
}

          <div class="tx-sync-actions">
            <button class="btn btn-ghost btn-sm" ${canSync ? '' : 'disabled'} onclick="syncSelectedTxWallet('period')">Стянуть период</button>
            <button class="btn btn-ghost btn-sm" ${canSync ? '' : 'disabled'} onclick="syncSelectedTxWallet('all')">Стянуть всё</button>
          </div>
          <div class="tx-sync-control">
            <label>Актив</label>
            <select class="form-select" onchange="state.txSync.asset=this.value;state.txSync.totals=null;rerender()">
              ${assetOptions.map(asset => `<option value="${asset}" ${state.txSync.asset===asset?'selected':''}>${asset}</option>`).join('')}
            </select>
          </div>
          <div class="tx-sync-actions">
            <button class="btn btn-ghost btn-sm" onclick="calculateTxAssetTotals()">Посчитать валюту</button>
          </div>
        </div>
        <div class="form-hint">Кнопки 50/100/N загружают последние транзакции. “Период” загружает выбранный диапазон дат, “всё” — всю историю до серверного лимита.</div>
      </div>
    </div>
    ${renderTxTotals()}
    <div class="card">
      <div class="card-header">
        <div class="card-title">${filtered.length} транзакций</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Хэш</th><th>Время</th><th>Кошелёк</th><th>Отправитель</th><th>Получатель</th><th>Сумма</th><th>Актив</th><th>Направление</th><th>USD</th><th>Сеть</th><th></th>
          </tr></thead>
          <tbody>
            ${filtered.map(tx => {
              const wallet = MOCK.wallets.find(w => w.id === tx.wallet_id);
              const key = txKey(tx);
              const displayHash = txDisplayHash(tx);
              const fromAddress = txFromAddress(tx);
              const toAddress = txToAddress(tx);
              const asset = normalizeAssetSymbol(tx);
              const amount = Number(tx.token_amount || tx.amount || 0);
              return `
            <tr class="tx-row" onclick="openTransactionDetails('${key}')">
              <td>${copyableValue(displayHash)}</td>
              <td style="font-size:12px;color:var(--text2)">${fmtDate(tx.timestamp)}</td>
              <td>
                <div style="font-weight:600;color:var(--text)">${walletDisplayName(wallet)}</div>
                <div class="addr mono" style="font-size:11px">${wallet ? copyableValue(wallet.address) : '—'}</div>
              </td>
              <td>${copyableValue(fromAddress)}</td>
              <td>${copyableValue(toAddress)}</td>
              <td class="mono" style="font-weight:500">${fmtPlain(amount, 6)}</td>
              <td><span style="font-weight:600;color:var(--text)">${asset}</span></td>
              <td>${dirBadge(tx.direction)}</td>
              <td style="color:var(--text2)">${fmtUsd(tx.usd_value)}</td>
              <td>${netBadge(tx.network)}</td>
              <td>
                <div class="tx-actions">
                  <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditTransaction('${key}')">Изм.</button>
                  <button class="btn btn-ghost btn-sm btn-danger" onclick="event.stopPropagation();removeTransaction('${key}')">✕</button>
                </div>
              </td>
            </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <span>Показано ${filtered.length} транзакций</span>
        <div class="pagination-btns">
          <button class="pg-btn" disabled>←</button>
          <button class="pg-btn active">1</button>
          <button class="pg-btn">→</button>
        </div>
      </div>
    </div>
  </div>
  ${txModal}
  ${txDetails}`;
}

function renderTransactionModal() {
  const editing = state.txDraftHash ? getTransactionByHash(state.txDraftHash) : null;
  const editingHash = editing ? txDisplayHash(editing) : '';
  const selectedWalletId = editing?.wallet_id || state.txFilters.walletId || MOCK.wallets[0]?.id || '';
  const walletOptions = MOCK.wallets.map(w => `<option value="${w.id}" ${selectedWalletId===w.id?'selected':''}>${walletDisplayName(w)} (${w.network.toUpperCase()})</option>`).join('');
  return `
  <div class="modal-overlay ${state.modal === 'txForm' ? 'open' : ''}" onclick="closeModal(event)">
    <div class="modal modal-wide">
      <div class="modal-header">
        <div class="modal-title">${editing ? 'Редактировать транзакцию' : 'Добавить транзакцию'}</div>
        <button class="btn-icon" onclick="closeActiveModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Кошелёк</label>
            <select class="form-select" id="txWallet">${walletOptions}</select>
          </div>
          <div class="form-group">
            <label class="form-label">Хэш транзакции</label>
            <input class="form-input" id="txHash" value="${editingHash}" ${editing ? 'disabled' : ''} placeholder="0x… / TRON-хэш…" autocomplete="off"/>
            <input type="hidden" id="txBlock" value="${editing?.block_number || ''}"/>
            <input type="hidden" id="txResult" value="${editing?.result || ''}"/>
            <input type="hidden" id="txStatus" value="${editing?.status || ''}"/>
            <input type="hidden" id="txConfirmations" value="${editing?.confirmations || ''}"/>
            <input type="hidden" id="txResources" value="${editing?.resources_fee || ''}"/>
            <input type="hidden" id="txType" value="${editing?.tx_type || 'transfer'}"/>
            <input type="hidden" id="txResourceType" value="${editing?.resource_type || ''}"/>
            <input type="hidden" id="txResourceValue" value="${editing?.resource_value || ''}"/>
            <input type="hidden" id="txStakedReleased" value="${editing?.staked_asset_released || ''}"/>
            <input type="hidden" id="txSignatures" value="${(editing?.signature_addresses || []).join(',')}"/>
            <input type="hidden" id="txNativeAmount" value="${editing?.native_amount || ''}"/>
            <input type="hidden" id="txNativeAsset" value="${editing?.native_asset || 'TRX'}"/>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" id="txLookupBtn" style="margin-bottom:18px" onclick="fillTransactionFromHash()">Заполнить по хэшу</button>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Время</label>
            <input class="form-input" type="datetime-local" id="txTimestamp" value="${toUtcInputValue(editing?.timestamp)}" style="font-family:var(--font)"/>
          </div>
          <div class="form-group">
            <label class="form-label">Направление</label>
            <select class="form-select" id="txDirection">
              <option value="incoming" ${editing?.direction==='incoming'?'selected':''}>Пришло</option>
              <option value="outgoing" ${editing?.direction==='outgoing'?'selected':''}>Ушло</option>

          </div>
          <div class="form-group">
            <label class="form-label">Отправитель</label>
            <input class="form-input" id="txFrom" value="${editing?.from_address || ''}" autocomplete="off"/>
