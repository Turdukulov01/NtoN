          <div class="form-group">
            <label class="form-label">Получатель</label>
            <input class="form-input" id="txTo" value="${editing?.to_address || ''}" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label class="form-label">Сумма</label>
            <input class="form-input" id="txAmount" value="${editing?.amount || ''}" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label class="form-label">Актив</label>
            <input class="form-input" id="txAsset" value="${editing?.asset || ''}" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label class="form-label">USD</label>
            <input class="form-input" id="txUsd" value="${editing?.usd_value || ''}" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label class="form-label">Адрес владельца</label>
            <input class="form-input" id="txOwner" value="${editing?.owner_address || ''}" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label class="form-label">Адрес контракта</label>
            <input class="form-input" id="txContract" value="${editing?.contract_address || ''}" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label class="form-label">Метод</label>
            <input class="form-input" id="txMethod" value="${editing?.method || ''}" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label class="form-label">ID метода</label>
            <input class="form-input" id="txMethodId" value="${editing?.method_id || ''}" autocomplete="off"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Входные данные / параметры вызова</label>
          <input class="form-input" id="txInput" value="${editing?.input_data || ''}" autocomplete="off"/>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeActiveModal()">Отмена</button>
        <button class="btn btn-primary" onclick="submitTransaction()">${editing ? 'Сохранить' : 'Добавить'}</button>
      </div>
    </div>
  </div>`;
}

function renderTransactionDetailsModal() {
  const tx = state.txDetailHash ? getTransactionByHash(state.txDetailHash) : null;
  const wallet = tx ? getWalletById(tx.wallet_id) : null;
  if (!tx) return '';
  const key = txKey(tx);
  const displayHash = txDisplayHash(tx);
  const fromAddress = txFromAddress(tx);
  const toAddress = txToAddress(tx);
  const isResourceReclaim = tx.tx_type === 'resource_reclaim';
  const operationValue = isResourceReclaim
    ? `
      <div class="detail-label">Адрес владельца</div><div class="detail-value mono">${copyableValue(tx.owner_address)}</div>
      <div class="detail-label">Ресурсы взяты с</div><div class="detail-value mono">${copyableValue(toAddress)}</div>
      <div class="detail-label">Разблокированный стейк</div><div class="detail-value">${fmtPlain(tx.staked_asset_released || tx.amount)} TRX</div>
      <div class="detail-label">Возвращённые ресурсы</div><div class="detail-value">${fmtPlain(tx.resource_value, 2)} ${tx.resource_type || '—'}</div>
      <div class="detail-label">Список подписей</div><div class="detail-value mono">${(tx.signature_addresses || []).map(value => copyableValue(value)).join('<br/>') || '—'}</div>
    `
    : `
      <div class="detail-label">Адрес владельца</div><div class="detail-value mono">${copyableValue(tx.owner_address || fromAddress)}</div>
      <div class="detail-label">Адрес контракта</div><div class="detail-value mono">${copyableValue(tx.contract_address)}</div>
      <div class="detail-label">Перевод токена</div><div class="detail-value">От ${copyableValue(tx.token_from || fromAddress)}<br/>Кому ${copyableValue(tx.token_to || toAddress)}<br/><strong>${tx.token_amount || tx.amount} ${tx.token_symbol || tx.asset}</strong></div>
      <div class="detail-label">Сумма</div><div class="detail-value">${tx.native_amount || tx.amount} ${tx.native_asset || tx.asset}</div>
    `;
  const methodValue = isResourceReclaim
    ? ''
    : `<div class="detail-label">Вызов метода</div><div class="detail-value">${tx.method || '—'}<br/>ID метода: <span class="mono">${tx.method_id || '—'}</span><br/><span class="mono">${tx.input_data || '—'}</span></div>`;
  return `
  <div class="modal-overlay ${state.modal === 'txDetails' ? 'open' : ''}" onclick="closeModal(event)">
    <div class="modal modal-wide">
      <div class="modal-header">
        <div>
          <div class="modal-title">Детали транзакции</div>
          <div class="addr mono" style="margin-top:4px">${copyableValue(displayHash)}</div>
        </div>
        <button class="btn-icon" onclick="closeActiveModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="detail-grid">
          <div class="detail-label">Кошелёк</div><div class="detail-value">${walletDisplayName(wallet)} ${wallet ? `(${wallet.network.toUpperCase()})` : ''}</div>
          <div class="detail-label">Результат</div><div class="detail-value">${txResultText(tx.result, tx.is_error)}</div>
          <div class="detail-label">Статус</div><div class="detail-value">${txStatusText(tx.status, tx.is_error)} · ${tx.direction === 'incoming' ? 'Пришло' : 'Ушло'}${tx.confirmations ? ` · ${tx.confirmations}` : ''}</div>
          <div class="detail-label">Блок</div><div class="detail-value">${tx.block_number || '—'}</div>
          <div class="detail-label">Время</div><div class="detail-value">${fmtDate(tx.timestamp)}</div>
          ${operationValue}
          <div class="detail-label">Ресурсы и комиссия</div><div class="detail-value">${tx.resources_fee || '—'}</div>
          <div class="detail-label">USD</div><div class="detail-value">${fmtUsd(tx.usd_value)}</div>
          ${methodValue}
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="openEditTransaction('${key}')">Редактировать</button>
        <button class="btn btn-danger" onclick="removeTransaction('${key}')">Удалить</button>
      </div>
    </div>
  </div>`;
}

function renderAnalytics() {
  const walletOptions = MOCK.wallets.map(w => `<option value="${w.id}" ${state.analyticsFilter.walletId===w.id?'selected':''}>${walletDisplayName(w)} (${w.network.toUpperCase()})</option>`).join('');
  const assetOptions = getAnalyticsAssetOptions(state.analyticsFilter.walletId, state.analyticsFilter.year);
  const selectedAsset = assetOptions.includes(state.analyticsFilter.asset) ? state.analyticsFilter.asset : 'all';
  const range = getAnalyticsDateRange(state.analyticsFilter.year);
  const group = ['tx', 'day', 'month'].includes(state.analyticsFilter.group) ? state.analyticsFilter.group : 'tx';
  const tableGroup = group === 'month' ? 'month' : 'day';
  const metric = state.analyticsFilter.metric === 'amount' ? 'amount' : 'count';
  const chartDirection = ['all', 'incoming', 'outgoing'].includes(state.analyticsFilter.chartDirection) ? state.analyticsFilter.chartDirection : 'all';
  const todayMax = todayInputValue();
  const data = getAnalyticsRows(state.analyticsFilter.walletId, state.analyticsFilter.year, selectedAsset, tableGroup);
  const totals = getAnalyticsAssetTotals(state.analyticsFilter.walletId, state.analyticsFilter.year, selectedAsset);
  const summary = getAnalyticsSummary(state.analyticsFilter.walletId, state.analyticsFilter.year, selectedAsset);
  const maxVol = Math.max(1, ...data.map(d => Number(d.volume_total || 0)));
  const assetChips = summary.assets.length
    ? summary.assets.map(asset => `<span class="asset-chip">${asset}</span>`).join(' ')
    : '<span style="color:var(--text3)">—</span>';
  const flowCards = totals.length ? totals.map(row => {
    const netPositive = Number(row.net_flow) >= 0;
    return `
      <div class="flow-card">
        <div class="flow-card-head">
          <span class="asset-chip">${row.asset}</span>
          <span class="flow-period">${row.asset_type} · ${row.network_label}</span>
        </div>
        <div class="flow-net" style="color:${netPositive ? 'var(--green)' : 'var(--red)'}">${netPositive ? '+' : ''}${fmt(row.net_flow, 4)} ${row.asset}</div>
        <div class="flow-usd">Оборот ≈ ${fmtUsdt(row.volume_total_usd)}</div>
        <div class="flow-stats">
          <div>
            <div class="flow-stat-label">Пришло</div>
            <div class="flow-stat-value" style="color:var(--green)">${fmt(row.volume_in, 4)}</div>
          </div>
          <div>
            <div class="flow-stat-label">Ушло</div>
            <div class="flow-stat-value" style="color:var(--red)">${fmt(row.volume_out, 4)}</div>
          </div>
        </div>
        <div class="flow-tx">${row.tx_count_total} транзакц. · входящих ${row.tx_count_in} / исходящих ${row.tx_count_out}</div>
      </div>`;
  }).join('') : '';
  const groupLabel = group === 'tx' ? 'отдельные транзакции' : group === 'day' ? 'по дням' : 'по месяцам';
  const metricLabel = metric === 'count' ? 'количество' : 'сумма';
  const directionLabel = chartDirection === 'incoming' ? 'только входящие' : chartDirection === 'outgoing' ? 'только исходящие' : 'входящие и исходящие';
  const tableTitle = tableGroup === 'day' ? 'Сводка по дням' : 'Сводка по месяцам';

  return `
  <div class="topbar">
    <div class="page-title">Аналитика</div>
    <div class="topbar-actions">
      <select class="filter-select" onchange="state.analyticsFilter.walletId=this.value||null;state.analyticsFilter.asset='all';rerender()">
        <option value="" ${!state.analyticsFilter.walletId?'selected':''}>Все кошельки</option>
        ${walletOptions}
      </select>
      <select class="filter-select" onchange="state.analyticsFilter.asset=this.value;rerender()">
        <option value="all" ${selectedAsset==='all'?'selected':''}>Все активы</option>
        ${assetOptions.map(asset => `<option value="${asset}" ${selectedAsset===asset?'selected':''}>${asset}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="setAnalyticsYear(parseInt(this.value))">
        <option value="2026" ${state.analyticsFilter.year===2026?'selected':''}>2026</option>
        <option value="2025" ${state.analyticsFilter.year===2025?'selected':''}>2025</option>
      </select>
    </div>
  </div>
  <div class="content content-narrow">

    <div class="analytics-controls">
      <div class="analytics-control">
        <label>Дата от</label>
        <input class="form-input" type="date" value="${range.fromValue}" max="${todayMax}" onchange="setAnalyticsDateFilter('dateFrom', this.value)"/>
      </div>
      <div class="analytics-control">
        <label>Дата до</label>
        <input class="form-input" type="date" value="${range.toValue}" max="${todayMax}" onchange="setAnalyticsDateFilter('dateTo', this.value)"/>
      </div>
      <div class="analytics-control">
        <label>График</label>
        <select class="form-select" onchange="state.analyticsFilter.group=this.value;rerender()">
          <option value="tx" ${group==='tx'?'selected':''}>По транзакциям</option>
          <option value="day" ${group==='day'?'selected':''}>По дням</option>
          <option value="month" ${group==='month'?'selected':''}>По месяцам</option>
        </select>
      </div>
      <div class="analytics-control">
        <label>Значение</label>
        <select class="form-select" onchange="state.analyticsFilter.metric=this.value;rerender()">
          <option value="count" ${metric==='count'?'selected':''}>Количество</option>
          <option value="amount" ${metric==='amount'?'selected':''}>Сумма</option>
        </select>
      </div>
      <div class="analytics-control">
        <label>Направление</label>
        <select class="form-select" onchange="state.analyticsFilter.chartDirection=this.value;rerender()">
          <option value="all" ${chartDirection==='all'?'selected':''}>Все</option>
          <option value="incoming" ${chartDirection==='incoming'?'selected':''}>Входящие</option>
          <option value="outgoing" ${chartDirection==='outgoing'?'selected':''}>Исходящие</option>
        </select>
      </div>
      <div class="analytics-buttons">
        <button class="btn btn-ghost btn-sm" onclick="setAnalyticsPreset(7)">7д</button>
        <button class="btn btn-ghost btn-sm" onclick="setAnalyticsPreset(30)">30д</button>
        <button class="btn btn-ghost btn-sm" onclick="setAnalyticsPreset('year')">Год</button>
      </div>
    </div>

    <div class="analytics-summary">
      <div class="analytics-metric">
        <div class="metric-label">Активы в обороте</div>
        <div class="metric-value">${summary.assets.length}</div>
        <div class="metric-sub">${assetChips}</div>
      </div>
      <div class="analytics-metric">
        <div class="metric-label">Пришло</div>
        <div class="metric-value" style="color:var(--green)">${summary.incomingTx}</div>
        <div class="metric-sub">входящих транзакций</div>
      </div>
      <div class="analytics-metric">
        <div class="metric-label">Ушло</div>
        <div class="metric-value" style="color:var(--red)">${summary.outgoingTx}</div>
        <div class="metric-sub">исходящих транзакций</div>
      </div>
      <div class="analytics-metric">
        <div class="metric-label">Оборот, примерно</div>
        <div class="metric-value">${fmtUsdt(summary.volumeTotalUsd)}</div>
        <div class="metric-sub">комиссии: ${fmt(summary.feesTrx, 4)} TRX · ${summary.serviceTx} сервисных операций</div>
      </div>
    </div>

    ${flowCards ? `<div class="asset-flow-grid">${flowCards}</div>` : ''}

    <div class="card analytics-chart-card">
      <div class="card-header">
        <div class="card-title">График транзакций</div>
        <div style="font-size:12px;color:var(--text3)">${groupLabel} · ${metricLabel} · ${directionLabel}</div>
      </div>
      <div class="card-body">
        <div class="chart-wrap analytics-chart-wrap"><canvas id="analyticsChart"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">${tableTitle} по активам</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Период</th><th>Актив</th><th>Тип</th>
            <th>Пришло</th>
            <th>Ушло</th>
            <th>Оборот</th>
            <th>≈ USDT</th>
            <th>Чистый поток</th>
            <th>Входящие</th><th>Исходящие</th><th>Всего</th>
          </tr></thead>
          <tbody>
            ${data.length ? data.map(row => {
              const pct = Math.round(Number(row.volume_total || 0) / maxVol * 100);
              const netPositive = parseFloat(row.net_flow) >= 0;
              return `
              <tr>
                <td style="font-weight:600">${row.period_label}</td>
                <td><span class="asset-chip">${row.asset}</span></td>
                <td style="color:var(--text2)">${row.asset_type}</td>
                <td>
                  <div class="vol-bar-wrap">
                    <div class="vol-bar-bg"><div class="vol-bar-fill vol-bar-in" style="width:${pct}%"></div></div>
                    <span class="mono" style="color:var(--green);min-width:90px;text-align:right">${fmt(row.volume_in, 4)}</span>
                  </div>
                </td>
                <td>
                  <div class="vol-bar-wrap">
                    <div class="vol-bar-bg"><div class="vol-bar-fill vol-bar-out" style="width:${pct}%"></div></div>
                    <span class="mono" style="color:var(--red);min-width:90px;text-align:right">${fmt(row.volume_out, 4)}</span>
                  </div>
                </td>
                <td class="mono" style="font-weight:600">${fmt(row.volume_total, 4)}</td>
                <td class="mono" style="font-weight:600;color:var(--text2)">${fmtUsdt(row.volume_total_usd)}</td>
                <td class="mono" style="color:${netPositive ? 'var(--green)' : 'var(--red)'}">
                  ${netPositive ? '+' : ''}${fmt(row.net_flow, 4)}
                </td>
                <td style="color:var(--green)">${row.tx_count_in}</td>
                <td style="color:var(--red)">${row.tx_count_out}</td>
                <td style="color:var(--text2)">${row.tx_count_total}</td>
              </tr>`;
            }).join('') : `
              <tr>
                <td colspan="11" style="text-align:center;color:var(--text3);padding:28px">Нет переводов с положительной суммой для выбранного фильтра</td>
              </tr>
            `}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function renderTrace() {
  const tronWallets = getTraceTronWallets();
  const selectedWallet = getSelectedTraceWallet();
  const selectedWalletId = selectedWallet?.id || '';
  const assetOptions = getTraceAssetOptions();
  const result = state.traceResult;
  const totals = getTraceTotals(result);
  const isLoading = state.traceStatus === 'running';
  const totalLabel = totals.length
    ? `<div class="trace-asset-chips">${totals.map(row => `<span class="asset-chip">${esc(row.asset)} ${fmtTraceNumber(row.amount, 4)}</span>`).join('')}</div>`
    : '<span style="color:var(--text3)">—</span>';
  const errorBlock = state.traceError
    ? `<div class="login-error show" style="display:block;margin:0 0 14px">${esc(state.traceError)}</div>`
    : '';
  const timeLimitNote = result?.time_budget_hit
    ? ` Сработал лимит времени ${fmtTraceNumber(result.time_budget_seconds || 0, 0)} сек., поэтому показана ближайшая часть графа.`
    : '';
  const limitNote = result?.truncated
    ? ` Часть дальних связей ограничена глубиной, общим лимитом адресов/связей, временем запроса или Tronscan. При лимите показаны ближайшие к стартовому кошельку связи${result?.candidate_edges ? `: ${result.edges?.length || 0} из ${result.candidate_edges}` : ''}.${timeLimitNote}`
    : '';
  const branchLabel = state.traceFilter.maxBranches === 0 ? 'все найденные связи' : `топ ${state.traceFilter.maxBranches} связей`;
  const modeLabel = state.traceFilter.mode === 'outgoing' ? 'только исходящая цепочка' : 'исходящая цепочка + входящие источники';
  const tracePeriodLabel = formatPeriodLabel({
    days: state.traceFilter.days,
    all_time: state.traceFilter.days === 0 && !state.traceFilter.dateFrom && !state.traceFilter.dateTo,
    date_from: state.traceFilter.dateFrom,
    date_to: state.traceFilter.dateTo,
  });
  const todayMax = todayInputValue();
  const note = `<div class="trace-note">Граф показывает фактические адресные связи из Tronscan и агрегирует суммы по связям всех показанных адресов. Это не баланс стартового кошелька и не оборот только из таблицы “Транзакции”. Основная цепочка строится по исходящим переводам проверенных адресов; входящие источники, если включены, показаны как отдельный контекст и не означают продолжение той же самой крипты после смешивания на адресе.${limitNote}</div>`;

  if (!tronWallets.length) {
    return `
    <div class="topbar"><div class="page-title">Маршруты средств</div></div>
    <div class="content content-narrow">
      <div class="card">
        <div class="empty">
          <div class="empty-icon">▧</div>
          <div class="empty-title">Нет TRON-кошельков</div>
          <div class="empty-sub">Добавьте TRON-кошелёк, после этого можно будет построить маршрут средств через Tronscan.</div>
        </div>
      </div>
    </div>`;
  }

  return `
  <div class="topbar">
    <div class="page-title">Граф адресных связей</div>
    <div class="topbar-actions">
      <button class="btn btn-primary" onclick="loadTraceGraph()" ${isLoading ? 'disabled' : ''}>${isLoading ? 'Строю…' : 'Построить'}</button>
    </div>
  </div>
  <div class="content content-narrow">
    <div class="trace-controls">
      <div class="analytics-control">
        <label>Стартовый кошелёк</label>
        <select class="form-select" onchange="setTraceFilter('walletId', this.value)">
          ${tronWallets.map(wallet => `<option value="${wallet.id}" ${selectedWalletId===wallet.id?'selected':''}>${walletDisplayName(wallet)} · ${shortAddr(wallet.address)}</option>`).join('')}
        </select>
      </div>
      <div class="analytics-control">
        <label>Актив</label>
        <select class="form-select" onchange="setTraceFilter('asset', this.value)">
          <option value="all" ${state.traceFilter.asset==='all'?'selected':''}>Все активы</option>
          ${assetOptions.map(asset => `<option value="${asset}" ${state.traceFilter.asset===asset?'selected':''}>${asset}</option>`).join('')}
        </select>
      </div>
      <div class="analytics-control">
        <label>Тип графа</label>
        <select class="form-select" onchange="setTraceFilter('mode', this.value)">
          <option value="full" ${state.traceFilter.mode==='full'?'selected':''}>Исходящие + источники</option>
          <option value="outgoing" ${state.traceFilter.mode==='outgoing'?'selected':''}>Только исходящие</option>
        </select>
      </div>
      <div class="analytics-control">
        <label>Период</label>
        <select class="form-select" onchange="setTraceFilter('days', this.value)">
          <option value="0" ${state.traceFilter.days===0?'selected':''}>Всё время</option>
          <option value="7" ${state.traceFilter.days===7?'selected':''}>7 дней</option>
          <option value="31" ${state.traceFilter.days===31?'selected':''}>31 день</option>
          <option value="90" ${state.traceFilter.days===90?'selected':''}>90 дней</option>
        </select>
      </div>
      <div class="analytics-control">
        <label>Дата от</label>
        <input class="form-input" type="date" max="${todayMax}" value="${esc(state.traceFilter.dateFrom)}" onchange="setTraceFilter('dateFrom', this.value)"/>
      </div>
      <div class="analytics-control">
        <label>Дата до</label>
        <input class="form-input" type="date" max="${todayMax}" value="${esc(state.traceFilter.dateTo)}" onchange="setTraceFilter('dateTo', this.value)"/>
      </div>
      <div class="analytics-control">
        <label>Глубина</label>
        <select class="form-select" onchange="setTraceFilter('depth', this.value)">
          <option value="1" ${state.traceFilter.depth===1?'selected':''}>1 переход</option>
          <option value="2" ${state.traceFilter.depth===2?'selected':''}>2 перехода</option>
          <option value="3" ${state.traceFilter.depth===3?'selected':''}>3 перехода</option>
        </select>
      </div>
      <div class="analytics-control">
        <label>Связей на адрес</label>
        <select class="form-select" onchange="setTraceFilter('maxBranches', this.value)">
          <option value="0" ${state.traceFilter.maxBranches===0?'selected':''}>Все найденные</option>
          <option value="10" ${state.traceFilter.maxBranches===10?'selected':''}>Топ 10</option>
          <option value="25" ${state.traceFilter.maxBranches===25?'selected':''}>Топ 25</option>
        </select>
      </div>
      <div class="analytics-buttons">
        <button class="btn btn-ghost btn-sm" onclick="loadTraceGraph()" ${isLoading ? 'disabled' : ''}>↺</button>
      </div>
    </div>

    ${errorBlock}

    <div class="trace-summary">
      <div class="analytics-metric">
        <div class="metric-label">Адресов в графе</div>
        <div class="metric-value">${result?.nodes?.length || 0}</div>
        <div class="metric-sub">проверено: ${result?.visited_addresses || 0}</div>
      </div>
      <div class="analytics-metric">
        <div class="metric-label">Связей</div>
        <div class="metric-value">${result?.edges?.length || 0}</div>
        <div class="metric-sub">${modeLabel}</div>
      </div>
      <div class="analytics-metric">
        <div class="metric-label">Активы по связям</div>
        <div class="metric-value">${totals.length || 0}</div>
        <div class="metric-sub">${totalLabel}</div>
      </div>
      <div class="analytics-metric">
        <div class="metric-label">Источник</div>
        <div class="metric-value" style="font-size:16px">${selectedWallet ? shortAddr(selectedWallet.address) : '—'}</div>
        <div class="metric-sub">TRON · ${tracePeriodLabel} · ${state.traceFilter.depth} ур.</div>
      </div>
    </div>

    ${renderTraceAssetOverview(result, totals)}

    ${renderTraceStepExplorer(result, isLoading)}

    ${state.traceExpanded ? '<div class="trace-expand-backdrop" onclick="toggleTraceExpanded(false)"></div>' : ''}
    <div class="card trace-graph-card ${state.traceExpanded ? 'expanded' : ''}" style="margin-bottom:14px">
      <div class="card-header">
        <div class="card-title">Граф адресов и переводов</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="trace-legend">
            <span class="trace-legend-item"><span class="trace-legend-line"></span> исходящая цепочка</span>
            ${state.traceFilter.mode === 'full' ? '<span class="trace-legend-item"><span class="trace-legend-line incoming"></span> входящий источник</span>' : ''}
            <span>${state.traceFilter.asset === 'all' ? 'все активы' : state.traceFilter.asset} · ${branchLabel}</span>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="toggleTraceExpanded()">${state.traceExpanded ? 'Свернуть' : 'Развернуть'}</button>
        </div>
      </div>
      <div class="card-body">
        ${isLoading ? `
          <div class="empty">
            <div class="empty-icon">◌</div>
            <div class="empty-title">Строю маршрут через Tronscan</div>
            <div class="empty-sub">Проверяю входящие и исходящие переводы стартового адреса и следующих адресов.</div>
          </div>` : renderTraceGraph(result)}
        ${note}
      </div>
    </div>

    ${renderTraceTable(result)}
    ${renderTraceEdgeDetailsModal()}
  </div>`;
}

    return `

        <div class="empty">
          <div class="empty-icon">!</div>
          <div class="empty-title">Риск-скоринг ещё не рассчитан</div>
          <div class="empty-sub">Введите TRON-адрес и запустите проверку. Движок подтянет данные, построит ближайший маршрут и применит YAML-модель.</div>

  const metrics = result.metrics || {};
  const patterns = metrics.suspicious_patterns || [];

        <div class="risk-block-grid">
          ${['A','B','C','D'].map(code => `
            <div class="risk-block">

              <div class="risk-block-value">${fmtPlain(blocks[code] || 0, 2)}</div>

                <div>

                  <div class="risk-evidence-meta">действие для зоны · ${riskZoneText(zone)}</div>

            `).join('') : '<div class="risk-evidence-meta">Нет действий для текущей зоны.</div>'}

      <div class="card">

          <div class="risk-evidence-list">

              <div class="risk-evidence">
                <div>

                  <div class="risk-evidence-meta">${esc(item.reason || '')}</div>
                </div>

              </div>
            `).join('') : '<div class="risk-evidence-meta">Критический оверрайд не сработал.</div>'}

              <div class="risk-evidence">
                <div>
                  <div class="risk-evidence-title">${esc(item.id || 'политика')}</div>
                  <div class="risk-evidence-meta">${esc(item.reason || '')}</div>
                  <div class="risk-evidence-meta">${esc(item.jurisdiction?.matched_name || item.source || '')} · мин. балл ${fmtPlain(item.minimum_score, 2)}</div>
                </div>
                <span class="badge badge-pending">ПОЛИТИКА</span>
              </div>
            `).join('') : ''}
          </div>
        </div>
      </div>

    <div class="grid-2">

        <div class="card-header"><div class="card-title">Качество данных</div></div>

            <div class="risk-evidence-meta">Данные кошелька: ${dataQuality.wallet_collection_skipped ? 'агрегат внешнего KYT-провайдера' : 'локальная блокчейн-выборка'}</div>

                  ${(dataQuality.kyt_provider_report_id || externalKyt.provider_report_id) ? `<div class="risk-evidence-meta mono">отчёт · ${copyableValue(dataQuality.kyt_provider_report_id || externalKyt.provider_report_id)}</div>` : ''}
                </div>
                <span class="badge badge-pending">KYT</span>
              </div>
              <div class="risk-evidence-meta">${externalKytTags.slice(0, 5).map(tag => `${esc(tag.name || tag.tag || '')}: ${fmtPlain(tag.percent ?? tag.score ?? 0, 2)}%`).join(' · ') || 'Внешние теги переданы'}</div>

      <div class="card">

        <div class="card-body">

              <div class="risk-evidence">
                <div>
                  <div class="risk-evidence-title">${sanctionsScreening.override_hit ? 'подтверждённое совпадение' : sanctionsScreening.manual_review ? 'ручная проверка' : 'подтверждённых совпадений нет'}</div>
                  <div class="risk-evidence-meta">проверено субъектов: ${fmtPlain(sanctionsScreening.subjects_checked || 0, 0)} · ${esc(riskZoneText(sanctionsScreening.risk_zone || ''))}</div>
                </div>
                <span class="badge ${sanctionsScreening.override_hit ? 'badge-error' : sanctionsScreening.manual_review ? 'badge-pending' : 'badge-success'}">${esc(reviewBadgeText(sanctionsScreening.override_hit ? 'RED' : sanctionsScreening.manual_review ? 'REVIEW' : 'OK'))}</span>
              </div>
              ${sanctionsSubjects.slice(0, 5).map(subject => `
                <div class="risk-evidence-meta">${esc(subject.checked_subject_type || 'субъект')} · ${esc(subject.checked_subject_value || '')} · совпадений: ${(subject.matches || []).length}</div>
              `).join('')}
            ` : '<div class="risk-evidence-meta">Субъекты для санкционной проверки не переданы. UK list содержит лиц/организации, а не TRON-адреса.</div>'}

        </div>
      </div>

            ${exposures.length ? exposures.slice(0, 12).map(row => `
              <div class="risk-evidence">
                <div>
                  <div class="risk-evidence-title">${esc(row.tag_label || row.tag)} · ${fmtPlain(row.tag_score, 0)}</div>
                  <div class="risk-evidence-meta">${copyableValue(row.address)} · переход ${row.hop} · ${esc(row.source || '')}</div>
                </div>
                <span class="asset-chip">${esc(row.tag)}</span>
              </div>
            `).join('') : '<div class="risk-evidence-meta">Риск-теги не найдены в address_risk_tags БД, YAML или запросе.</div>'}
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Поведенческие сигналы</div></div>
        <div class="card-body">
          <div class="risk-evidence-list">
            ${patterns.length ? patterns.map(pattern => `
              <div class="risk-evidence">
                <div>
                  <div class="risk-evidence-title">${esc(pattern.title || pattern.code)}</div>
                  <div class="risk-evidence-meta">${esc(pattern.description || '')}</div>
                </div>
                <span class="badge badge-pending">${esc(pattern.severity || '')}</span>

            `).join('') : '<div class="risk-evidence-meta">Подозрительные поведенческие паттерны не найдены в загруженной выборке.</div>'}
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Компоненты модели</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Блок</th><th>Компонент</th><th>Значение</th><th>Балл</th><th>Доказательства</th></tr></thead>
          <tbody>
            ${Object.entries(blockDetails).flatMap(([blockCode, detail]) =>
              Object.entries(detail.components || {}).map(([componentCode, component]) => `
                <tr>
                  <td>${blockCode}</td>
                  <td>${esc(component.label || componentCode)}</td>
                  <td class="mono">${esc(JSON.stringify(component.value ?? ''))}</td>
                  <td class="mono">${fmtPlain(component.score, 2)}</td>
                  <td style="color:var(--text2)">${(component.evidence || []).map(esc).join(', ') || '—'}</td>
                </tr>
              `)
            ).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderSelectOptions(options, currentValue) {
  return options.map(([value, label]) => (
    `<option value="${esc(value)}" ${String(currentValue || '') === String(value) ? 'selected' : ''}>${esc(label)}</option>`
  )).join('');
}

  const selectedUsesProvider = riskKytModeUsesProvider(selectedKytProvider);
  const errorBlock = state.riskError
    ? `<div class="login-error show" style="display:block;margin:0 0 14px">${esc(state.riskError)}</div>`
    : '';
  const emptyOption = [['', 'Не указано']];
  const licenseOptions = [

function renderKytDatabase() {

  const isLoading = data.status === 'running';
  const reportForDetail = detail || reports.find(report => report.id === data.selectedReportId) || null;
  const detailExposures = reportForDetail?.exposures || [];
  const labelForm = data.labelForm;
  const errorBlock = data.error
    ? `<div class="login-error show" style="display:block;margin:0 0 14px">${esc(data.error)}</div>`
    : '';

  const rawBlock = detail?.raw_response
    ? `<details class="risk-details" style="margin-top:12px">
        <summary>Сырой ответ провайдера</summary>

                const top = (report.exposures || []).slice(0, 3).map(item => `${esc(item.category_name)} ${fmtPlain(item.percent, 2)}%`).join('<br/>');
                const selected = report.id === data.selectedReportId ? 'background:rgba(34,211,165,0.055)' : '';

                  <tr style="${selected}">
                    <td style="color:var(--text2);font-size:12px">${fmtDate(report.fetched_at)}</td>
                    <td>${copyableValue(report.address)}<div class="metric-sub">${esc(String(report.network || '').toUpperCase())} · ${esc(report.provider || '')}</div></td>
                    <td class="mono">${fmtPlain(report.provider_score, 2)}</td>
                    <td class="mono">${fmtPlain(report.tx_total, 0)}</td>

                    <td><span class="badge ${report.cache_status === 'fresh' ? 'badge-success' : 'badge-pending'}">${report.cache_status === 'fresh' ? 'свежий' : report.cache_status === 'expired' ? 'устарел' : 'сохранён'}</span></td>

  charts = {};
}

function initCharts() {
  Chart.defaults.color = '#8b90a7';
  Chart.defaults.font.family = "'Space Grotesk', sans-serif";
  Chart.defaults.font.size = 12;

  // Dashboard volume chart
  const vc = document.getElementById('volumeChart');
  if (vc) {
    charts.vol = new Chart(vc, {
      type: 'bar',
      data: {
        labels: ['Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr'],
        datasets: [
          { label: 'Volume IN', data: [8200, 11500, 6800, 9100, 14800, 6250], backgroundColor: 'rgba(34,211,165,0.52)', borderRadius: 6, maxBarThickness: 46 },
          { label: 'Volume OUT', data: [5400, 8200, 4200, 5600, 8200, 1200], backgroundColor: 'rgba(248,113,113,0.44)', borderRadius: 6, maxBarThickness: 46 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' } },
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v => '$' + fmt(v) } }
        }
      }
    });
  }

  // Network pie
  const nc = document.getElementById('netChart');
  if (nc) {
    charts.net = new Chart(nc, {
      type: 'doughnut',
      data: {
        labels: ['Ethereum', 'Bitcoin', 'TRON'],
        datasets: [{ data: [2, 2, 1], backgroundColor: ['#627eea', '#f7931a', '#ef0027'], borderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        cutout: '65%'
      }
    });
  }

  // Analytics chart
  const ac = document.getElementById('analyticsChart');
  if (ac) {
    const assetOptions = getAnalyticsAssetOptions(state.analyticsFilter.walletId, state.analyticsFilter.year);
    const selectedAsset = assetOptions.includes(state.analyticsFilter.asset) ? state.analyticsFilter.asset : 'all';
    const group = ['tx', 'day', 'month'].includes(state.analyticsFilter.group) ? state.analyticsFilter.group : 'tx';
    const metric = state.analyticsFilter.metric === 'amount' ? 'amount' : 'count';
    const chartDirection = ['all', 'incoming', 'outgoing'].includes(state.analyticsFilter.chartDirection) ? state.analyticsFilter.chartDirection : 'all';
    const chartZoom = Math.min(6, Math.max(1, Number(state.analyticsFilter.chartZoom || 1)));
    const chartItems = getAnalyticsChartItems(state.analyticsFilter.walletId, state.analyticsFilter.year, selectedAsset, group, metric, chartDirection);
    const labels = group === 'tx'
      ? chartItems.map(item => `${item.label} · ${item.asset}`)
      : [...new Set(chartItems.map(item => item.label))];
    const chartWrap = ac.parentElement;
    bindAnalyticsChartWheel(chartWrap);
    const wrapWidth = Math.max(1, chartWrap?.clientWidth || 680);
    const chartWidth = Math.ceil(wrapWidth * chartZoom);
    const chartHeight = 260;
    ac.width = chartWidth;
    ac.height = chartHeight;
    ac.style.width = `${chartWidth}px`;
    ac.style.height = `${chartHeight}px`;
    const datasetKeys = [...new Set(chartItems.map(item => item.key))].sort();
    const palette = {
      BTC: { in: 'rgba(247,147,26,0.54)', out: 'rgba(247,147,26,0.28)' },
      ETH: { in: 'rgba(96,165,250,0.54)', out: 'rgba(96,165,250,0.28)' },
      TRX: { in: 'rgba(248,113,113,0.54)', out: 'rgba(248,113,113,0.28)' },
      USDT: { in: 'rgba(34,211,165,0.5)', out: 'rgba(248,113,113,0.42)' },
    };
    const itemLookup = {};
    const datasets = datasetKeys.map(key => {
      const splitAt = key.lastIndexOf('-');
      const asset = key.slice(0, splitAt);
      const direction = key.slice(splitAt + 1);
      const colors = palette[asset] || { in: 'rgba(34,211,165,0.5)', out: 'rgba(248,113,113,0.42)' };
      return {
        label: `${asset} ${direction === 'incoming' ? 'IN' : 'OUT'}`,
        analyticsKey: key,
        data: labels.map((label, index) => {
          const item = group === 'tx'
            ? (chartItems[index]?.key === key ? chartItems[index] : null)
            : chartItems.find(candidate => candidate.key === key && candidate.label === label);
          if (item) itemLookup[`${key}-${index}`] = item;
          return item ? item.value : null;
        }),
        backgroundColor: direction === 'incoming' ? colors.in : colors.out,
        borderRadius: 6,
        maxBarThickness: group === 'tx' ? 30 : 42,
        categoryPercentage: group === 'tx' ? 0.72 : 0.62,
        barPercentage: group === 'tx' ? 0.78 : 0.72,
      };
    });
    charts.analytics = new Chart(ac, {
      type: 'bar',
      data: {
        labels,
        datasets,
      },
      options: {
        responsive: false, maintainAspectRatio: false,
        devicePixelRatio: Math.max(1, window.devicePixelRatio || 1),
        onClick: (event, elements) => {
          if (!elements.length || group !== 'tx') return;
          const element = elements[0];
          const dataset = datasets[element.datasetIndex];
          const item = itemLookup[`${dataset.analyticsKey}-${element.index}`];
          if (item?.hash) openTransactionDetails(item.hash);
        },
        plugins: {
          legend: { position: 'top', labels: { boxWidth: 10, boxHeight: 10, useBorderRadius: true } },
          tooltip: {
            callbacks: {
              title: items => {
                const ctx = items[0];
                const dataset = datasets[ctx.datasetIndex];
                const item = itemLookup[`${dataset.analyticsKey}-${ctx.dataIndex}`];
                return item?.title || ctx.label;
              },
              label: ctx => {
                const dataset = datasets[ctx.datasetIndex];
                const item = itemLookup[`${dataset.analyticsKey}-${ctx.dataIndex}`];
                if (!item) return `${ctx.dataset.label}: ${ctx.formattedValue}`;
                if (metric === 'count') return `${item.direction_label}: ${item.tx_count || 1} транзакц. · ${fmtPlain(item.amount, 6)} ${item.asset}`;
                return `${item.direction_label}: ${fmtPlain(item.amount, 6)} ${item.asset}`;
              },
              afterLabel: ctx => {
                const dataset = datasets[ctx.datasetIndex];
                const item = itemLookup[`${dataset.analyticsKey}-${ctx.dataIndex}`];
                if (!item) return '';
                const lines = [`Сеть: ${item.network_label}`];
                if (item.wallet) lines.push(`Кошелёк: ${item.wallet}`);
                if (item.hash) lines.push(`Хэш: ${shortAddr(item.hash)}`);
                return lines;
              },
            },
          },
        },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.035)' }, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: group === 'tx' ? 12 : 10 } },
          y: {
            grid: { color: 'rgba(255,255,255,0.035)' },
            stacked: false,
            beginAtZero: true,
            ticks: {
              maxTicksLimit: 5,
              precision: metric === 'count' ? 0 : undefined,
              callback: value => metric === 'count' ? value : fmt(value, 2),
            },
          },
        }
      }
    });
  }
}

function createSessionToken(email) {
  const expiresAt = Date.now() + AUTH_ACCOUNT.sessionHours * 60 * 60 * 1000;
  return btoa(JSON.stringify({ email, role: AUTH_ACCOUNT.role, expiresAt }));
}

function readSessionToken(token) {
  try {
    return JSON.parse(atob(token));
  } catch (e) {
    return null;
  }
}

function restoreSession() {
  const session = state.token ? readSessionToken(state.token) : null;
  const valid = session
    && session.email === AUTH_ACCOUNT.email
    && session.role === AUTH_ACCOUNT.role
    && Number(session.expiresAt) > Date.now();

  if (!valid) {
    state.user = null;
    state.token = null;
    localStorage.removeItem('token');
    return false;
  }

  state.user = { email: session.email, role: session.role, name: AUTH_ACCOUNT.name };
  return true;
}

function doLogin(event) {
  if (event) event.preventDefault();

  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;

  if (!email || !pass) {
    state.loginError = 'Введите эл. почту и пароль.';
    rerender();
    return;
  }

  if (email !== AUTH_ACCOUNT.email || pass !== AUTH_ACCOUNT.password) {
    state.loginError = 'Неверная эл. почта или пароль.';
    document.getElementById('loginPass').value = '';
    rerender();
    return;
  }

  state.loginError = '';
  state.user = { email, role: AUTH_ACCOUNT.role, name: AUTH_ACCOUNT.name };
  state.token = createSessionToken(email);
  localStorage.setItem('token', state.token);
  toast('Добро пожаловать, Администратор!');
  rerender();
}

  state.user = null;

}

async function submitAddWallet() {
  let address = document.getElementById('newAddress').value.trim();
  const network = document.getElementById('newNetwork').value;
  const label = document.getElementById('newLabel').value.trim();
  const tags = document.getElementById('newTags').value.split(',').map(t=>t.trim()).filter(Boolean);

  if (!address) { toast('Адрес обязателен', 'error'); return; }

  try {
    const validation = await validateWalletAddress(network, address);
    if (!validation.valid) {
      toast(validation.detail || 'Некорректный адрес кошелька. Проверьте сеть и полный адрес.', 'error');
      return;
    }
    address = validation.address || address;
  } catch (e) {
    toast(e.message || 'Не удалось проверить адрес кошелька', 'error');
    return;
  }

  const duplicate = MOCK.wallets.some(wallet =>
    wallet.is_active !== false &&
    wallet.network === network &&
    String(wallet.address || '').toLowerCase() === address.toLowerCase()
  );
  if (duplicate) {
    toast('Такой кошелёк уже добавлен', 'error');
    return;
  }

  const wallet = {
    id: String(Date.now()),
    address, network, label, tags,
    is_active: true,
    last_sync: null,
  };
  MOCK.wallets.push(wallet);

  persistData();
  state.modal = null;
  toast(`Кошелёк добавлен: ${shortAddr(address)}`);
  if (SUPPORTED_SYNC_NETWORKS.includes(network)) {
    await syncWalletData(wallet.id, { navigateToTransactions: true });
    return;
  }
  rerender();
}

function txRiskFlags(tx) {
  const flags = [];
  const amount = Number(tx.token_amount || tx.amount || 0);
  const usd = Number(tx.usd_value || 0) || 0;
  if (tx.is_error) flags.push('failed');
  if (!Number.isFinite(amount) || amount <= 0) flags.push('zero_amount');
  if (isDustAmount(normalizeAssetSymbol(tx), amount)) flags.push('dust');
  if (!txFromAddress(tx) || !txToAddress(tx)) flags.push('missing_counterparty');
  if (usd >= 100000) flags.push('large_usd_transfer');
  return flags;
}

function isDustAmount(asset, amount) {
  if (!Number.isFinite(amount) || amount <= 0) return true;
  if (asset === 'BTC') return amount < 0.00001;
  if (asset === 'ETH' || asset === 'TRX') return amount < 0.001;
  if (['USDT', 'USDC', 'TUSD', 'USDD', 'USDJ'].includes(asset)) return amount < 1;
  return amount < 0.000001;
}

function normalizedTransactionObject(tx) {
  const wallet = getWalletById(tx.wallet_id);
  const walletAddress = wallet?.address || '';
  const from = txFromAddress(tx);
  const to = txToAddress(tx);
  const direction = inferDirectionForWallet(tx, wallet);
  const counterparty = direction === 'incoming' ? from : to;
  return {
    id: txKey(tx),
    chain: tx.network || wallet?.network || '',
    tx_hash: txDisplayHash(tx),
    wallet_address: walletAddress,
    direction,
    counterparty_address: counterparty,
    token_symbol: normalizeAssetSymbol(tx),
    amount: tx.token_amount || tx.amount || '0',
    amount_usd: tx.usd_value || '',
    timestamp: tx.timestamp || '',
    block_number: tx.block_number || '',
    risk_flags: txRiskFlags(tx).join('|'),
    raw_json: JSON.stringify(tx),
  };
}

function getNormalizedTransactionObjects(transactions = MOCK.transactions) {
  return transactions.map(normalizedTransactionObject);
}

function tableFromObjects(objects, headers) {
  return objects.map(row => headers.map(header => row[header] ?? ''));
}

function exportTable(headers, rows, format = 'csv', filenamePrefix = 'export', successMessage = 'Файл скачан') {
  const today = new Date().toISOString().slice(0,10);
  if (format === 'xls') {
    const htmlRows = [headers, ...rows]
      .map(row => `<tr>${row.map(cell => `<td>${esc(cell)}</td>`).join('')}</tr>`)
      .join('');
    const html = `<!doctype html><html><head><meta charset="UTF-8"></head><body><table>${htmlRows}</table></body></html>`;
    downloadBlob(html, `${filenamePrefix}_${today}.xls`, 'application/vnd.ms-excel;charset=utf-8');
    toast(successMessage);
    return;
  }
  const csv = [headers, ...rows].map(row => row.map(csvCell).join(',')).join('\n');
  downloadBlob(`\ufeff${csv}`, `${filenamePrefix}_${today}.csv`, 'text/csv;charset=utf-8');
  toast(successMessage);
}

function parseDateInputOrNull(value, endOfDay = false) {
  if (!value) return null;
  const date = new Date(`${value}T${endOfDay ? '23:59:59.999' : '00:00:00.000'}Z`);
  return Number.isNaN(date.getTime()) ? null : date;
}

function getReportTransactions({ walletId = 'all', asset = 'all', dateFrom = '', dateTo = '' } = {}) {
  const from = parseDateInputOrNull(dateFrom, false);
  const to = parseDateInputOrNull(dateTo, true);
  return MOCK.transactions
    .filter(tx => !tx.is_error)
    .filter(tx => !walletId || walletId === 'all' || tx.wallet_id === walletId)
    .filter(tx => asset === 'all' || normalizeAssetSymbol(tx) === asset)
    .filter(tx => {
      const date = new Date(tx.timestamp || 0);
      if (Number.isNaN(date.getTime())) return false;
      if (from && date < from) return false;
      if (to && date > to) return false;
      return true;
    })
    .filter(tx => Number(tx.token_amount || tx.amount || 0) > 0);
}

function buildTurnoverRows({ walletId = 'all', asset = 'all', dateFrom = '', dateTo = '', group = 'month' } = {}) {
  const groups = new Map();
  getReportTransactions({ walletId, asset, dateFrom, dateTo }).forEach(tx => {
    const date = new Date(tx.timestamp);
    const token = normalizeAssetSymbol(tx);
    const network = tx.network || getWalletById(tx.wallet_id)?.network || '';
    const period = group === 'day' ? dateInputFromUtc(date) : `${date.getUTCFullYear()}-${pad2(date.getUTCMonth() + 1)}`;
    const key = `${period}-${token}-${network}`;
    if (!groups.has(key)) {
      groups.set(key, {
        period,
        asset: token,
        network,
        volume_in: 0,
        volume_out: 0,
        volume_in_usd: 0,
        volume_out_usd: 0,
        tx_count_in: 0,
        tx_count_out: 0,
      });
    }
    const row = groups.get(key);
    const amount = Number(tx.token_amount || tx.amount || 0);
    const usd = Number(tx.usd_value || 0) || 0;
    const direction = inferDirectionForWallet(tx, getWalletById(tx.wallet_id));
    if (direction === 'incoming') {
      row.volume_in += amount;
      row.volume_in_usd += usd;
      row.tx_count_in += 1;
    } else {
      row.volume_out += amount;
      row.volume_out_usd += usd;
      row.tx_count_out += 1;
    }
  });

  return [...groups.values()].map(row => ({
    ...row,
    volume_total: row.volume_in + row.volume_out,
    net_flow: row.volume_in - row.volume_out,
    volume_total_usd: row.volume_in_usd + row.volume_out_usd,
    net_flow_usd: row.volume_in_usd - row.volume_out_usd,
    tx_count_total: row.tx_count_in + row.tx_count_out,
  })).sort((a, b) => a.period.localeCompare(b.period) || a.asset.localeCompare(b.asset));
}

function turnoverExportRows(rows) {
  const headers = ['period','asset','network','volume_in','volume_out','volume_total','net_flow','volume_in_usd','volume_out_usd','volume_total_usd','net_flow_usd','tx_count_in','tx_count_out','tx_count_total'];
  return {

function csvSplitLine(line, delimiter) {
  const result = [];
  let current = '';
  let quoted = false;
  for (let i = 0; i < line.length; i += 1) {
    const char = line[i];
    if (char === '"') {
      if (quoted && line[i + 1] === '"') {
        current += '"';
        i += 1;
      } else {
        quoted = !quoted;
      }
    } else if (char === delimiter && !quoted) {
      result.push(current.trim());
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current.trim());
  return result;
}

function detectDelimiter(line) {
  const variants = [',', ';', '\t'];
  return variants.sort((a, b) => line.split(b).length - line.split(a).length)[0];
}

function normalizeReportAmount(value) {
  const clean = String(value || '')
    .replace(/\s+/g, '')
    .replace(/[^\d,.-]/g, '')
    .replace(',', '.');
  const num = Number(clean);
  return Number.isFinite(num) ? num : 0;
}

function reportMonthKey(value, fallbackYear) {
  const raw = String(value || '').trim().toLowerCase();
  const monthNames = {
    'январь': 1, 'янв': 1, 'january': 1, 'jan': 1,
    'февраль': 2, 'фев': 2, 'february': 2, 'feb': 2,
    'март': 3, 'мар': 3, 'march': 3, 'mar': 3,
    'апрель': 4, 'апр': 4, 'april': 4, 'apr': 4,
    'май': 5, 'may': 5,
    'июнь': 6, 'июн': 6, 'june': 6, 'jun': 6,
    'июль': 7, 'июл': 7, 'july': 7, 'jul': 7,
    'август': 8, 'авг': 8, 'august': 8, 'aug': 8,
    'сентябрь': 9, 'сен': 9, 'september': 9, 'sep': 9,
    'октябрь': 10, 'окт': 10, 'october': 10, 'oct': 10,
    'ноябрь': 11, 'ноя': 11, 'november': 11, 'nov': 11,
    'декабрь': 12, 'дек': 12, 'december': 12, 'dec': 12,
  };
  const iso = raw.match(/(20\d{2})[-./](\d{1,2})/);
  if (iso) return `${iso[1]}-${pad2(Number(iso[2]))}`;
  const ru = raw.match(/(\d{1,2})[-./](20\d{2})/);
  if (ru) return `${ru[2]}-${pad2(Number(ru[1]))}`;
  for (const [name, month] of Object.entries(monthNames)) {
    if (raw.includes(name)) {
      const year = raw.match(/20\d{2}/)?.[0] || fallbackYear;
      return `${year}-${pad2(month)}`;
    }
  }
  return '';
}

async function readCompanyReportFile(file) {
  const lower = file.name.toLowerCase();
  if ((lower.endsWith('.xlsx') || lower.endsWith('.xls')) && window.XLSX) {
    const buffer = await file.arrayBuffer();
    const workbook = XLSX.read(buffer, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: '' });
    return rows.map(row => row.map(csvCell).join(',')).join('\n');
  }
  return file.text();
}

function parseCompanyReportText(text, defaultAsset, fallbackYear) {
  const lines = String(text || '').split(/\r?\n/).map(line => line.trim()).filter(Boolean);
  if (!lines.length) return [];
  const delimiter = detectDelimiter(lines[0]);
  const parsed = lines.map(line => csvSplitLine(line, delimiter));
  const header = parsed[0].map(cell => cell.toLowerCase());
  const hasHeader = header.some(cell => /месяц|период|month|period|date|дата|asset|актив|amount|сумм|оборот|volume|заяв/.test(cell));
  const dataRows = hasHeader ? parsed.slice(1) : parsed;
  const monthIndex = hasHeader ? Math.max(0, header.findIndex(cell => /месяц|период|month|period|date|дата/.test(cell))) : 0;
  const amountIndex = hasHeader ? Math.max(1, header.findIndex(cell => /amount|сумм|оборот|volume|заяв|reported/.test(cell))) : 1;
  const assetIndex = hasHeader ? header.findIndex(cell => /asset|актив|token|валют|currency/.test(cell)) : 2;
  const groups = new Map();

  dataRows.forEach(row => {
    const period = reportMonthKey(row[monthIndex], fallbackYear);
    if (!period) return;
    const asset = String(assetIndex >= 0 ? row[assetIndex] : defaultAsset || '').trim().toUpperCase() || defaultAsset || 'USDT';
    const amount = normalizeReportAmount(row[amountIndex]);
    const key = `${period}-${asset}`;
    const current = groups.get(key) || { period, asset, reported: 0 };
    current.reported += amount;
    groups.set(key, current);
  });
  return [...groups.values()].sort((a, b) => a.period.localeCompare(b.period) || a.asset.localeCompare(b.asset));
}

function buildReportCheckRows(companyRows, settings, tolerancePct) {
  const blockchainRows = buildTurnoverRows({ ...settings, group: 'month' })
    .filter(row => settings.asset === 'all' || row.asset === settings.asset);
  const reported = new Map(companyRows.map(row => [`${row.period}-${row.asset}`, row]));
  const blockchain = new Map(blockchainRows.map(row => [`${row.period}-${row.asset}`, row]));
  const keys = new Set([...reported.keys(), ...blockchain.keys()]);
  return [...keys].sort().map(key => {
    const company = reported.get(key);
    const chain = blockchain.get(key);
    const [period, ...assetParts] = key.split('-');
    const month = `${period}-${assetParts.shift()}`;
    const asset = company?.asset || chain?.asset || assetParts.join('-') || settings.asset;
    const declared = company?.reported || 0;
    const blockchainAmount = chain?.volume_total || 0;
    const difference = blockchainAmount - declared;
    const tolerance = Math.max(Math.abs(declared), Math.abs(blockchainAmount), 1) * (tolerancePct / 100);
    let status = 'Соответствует';
    let statusType = 'ok';
    if (!chain && declared === 0) {
      status = 'Кошелёк валидный, но без активности';
      statusType = 'info';
    } else if (declared === 0 && blockchainAmount > 0) {
      status = 'Нулевая отчётность, но активность была';
      statusType = 'bad';
    } else if (!company && blockchainAmount > 0) {
      status = 'Активен, но не отражён в отчёте';
      statusType = 'bad';
    } else if (Math.abs(difference) > tolerance) {
      status = 'Есть расхождение';
      statusType = 'warn';
    }
    return {
      period: chain?.period || company?.period || month,
      asset,
      reported: declared,
      blockchain: blockchainAmount,
      difference,
      status,
      statusType,
      tx_count: chain?.tx_count_total || 0,
    };
  });
}

async function runCompanyReportCheck() {
  const file = document.getElementById('companyReportFile')?.files?.[0];
  const walletId = document.getElementById('checkWallet')?.value || '';
  const wallet = getWalletById(walletId);
  if (!wallet) {
    state.reportCheck.result = { invalidWallet: true, rows: [] };
    toast('Выберите валидный кошелёк для сверки', 'error');
    rerender();
    return;
  }
  if (!file) {
    toast('Загрузите Excel/CSV отчёт компании', 'error');
    return;
  }
  try {
    const asset = document.getElementById('checkAsset')?.value || 'USDT';
    const fallbackYear = String(document.getElementById('checkYear')?.value || new Date().getFullYear());
    const text = await readCompanyReportFile(file);
    const companyRows = parseCompanyReportText(text, asset, fallbackYear);
    const tolerancePct = Number(document.getElementById('checkTolerance')?.value || 1) || 1;
    const settings = {
      walletId,
      asset,
      dateFrom: document.getElementById('checkFrom')?.value || `${fallbackYear}-01-01`,
      dateTo: document.getElementById('checkTo')?.value || `${fallbackYear}-12-31`,
    };
    const rows = buildReportCheckRows(companyRows, settings, tolerancePct);
    state.reportCheck = {
      filename: file.name,
      rows: companyRows,
      result: {
        wallet,
        settings,
        rows,
        totals: {
          ok: rows.filter(row => row.statusType === 'ok').length,
          warn: rows.filter(row => row.statusType === 'warn').length,
          bad: rows.filter(row => row.statusType === 'bad').length,
          info: rows.filter(row => row.statusType === 'info').length,
        },
      },
    };
    toast('Сверка отчёта выполнена');
    rerender();
  } catch (error) {
    toast(error.message || 'Не удалось прочитать отчёт', 'error');
  }
}

function buildConclusionData() {
  const settings = getExportReportSettings();
  const wallet = settings.walletId === 'all' ? null : getWalletById(settings.walletId);
  const rows = buildTurnoverRows({ ...settings, group: 'month' });
  const txs = getReportTransactions(settings).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  const totals = rows.reduce((acc, row) => {
    const key = row.asset;
    if (!acc[key]) acc[key] = { asset: key, in: 0, out: 0, total: 0, net: 0, tx: 0 };
    acc[key].in += row.volume_in;
    acc[key].out += row.volume_out;
    acc[key].total += row.volume_total;
    acc[key].net += row.net_flow;
    acc[key].tx += row.tx_count_total;
    return acc;
  }, {});
  const counterparties = new Set(txs.map(tx => {
    const dir = inferDirectionForWallet(tx, getWalletById(tx.wallet_id));
    return (dir === 'incoming' ? txFromAddress(tx) : txToAddress(tx)).toLowerCase();
  }).filter(Boolean));
  const first = txs[0]?.timestamp || '';
  const last = txs[txs.length - 1]?.timestamp || '';
  const transitAssets = Object.values(totals)
    .filter(row => row.in > 0 && row.out > 0 && Math.abs(row.in - row.out) / Math.max(row.in, row.out, 1) <= 0.01)
    .map(row => row.asset);
  const conclusion = !txs.length
    ? 'по выбранному периоду активность по адресу не обнаружена.'
    : transitAssets.length
    ? `адрес имеет признаки транзитного использования по активам ${transitAssets.join(', ')}: входящий и исходящий оборот близко совпадают.`
    : 'транзитный характер по одним только суммам не подтверждён; требуется ручная оценка контрагентов и назначения операций.';
  return { settings, wallet, rows, totals: Object.values(totals), txs, counterparties: counterparties.size, first, last, conclusion };
}

function transactionExportRows(transactions) {
  const headers = ['wallet_address','label','tx_hash','timestamp','from_address','to_address','amount','asset','direction','fee','usd_value','network','contract_address'];
  const rows = transactions.map(tx => {
    const wallet = getWalletById(tx.wallet_id);
    return [
      wallet?.address || '',
      wallet?.label || '',
      txDisplayHash(tx),
      tx.timestamp,
      txFromAddress(tx),
      txToAddress(tx),
      tx.token_amount || tx.amount,
      normalizeAssetSymbol(tx),
      tx.direction,
      tx.resources_fee || '',
      tx.usd_value,
      tx.network,
      tx.contract_address || '',
    ];
  });
  return { headers, rows };
}

function csvCell(value) {
  const clean = String(value ?? '');
  return /[",\n\r]/.test(clean) ? `"${clean.replace(/"/g, '""')}"` : clean;
}

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportTransactions(transactions, format = 'csv', filenamePrefix = 'transactions') {
  const { headers, rows } = transactionExportRows(transactions);
  const today = new Date().toISOString().slice(0,10);
  if (format === 'xls') {
    const htmlRows = [headers, ...rows]
      .map(row => `<tr>${row.map(cell => `<td>${esc(cell)}</td>`).join('')}</tr>`)
      .join('');
    const html = `<!doctype html><html><head><meta charset="UTF-8"></head><body><table>${htmlRows}</table></body></html>`;
    downloadBlob(html, `${filenamePrefix}_${today}.xls`, 'application/vnd.ms-excel;charset=utf-8');
    toast('Excel-файл скачан');
    return;
  }

  const csv = [headers, ...rows].map(row => row.map(csvCell).join(',')).join('\n');
  downloadBlob(`\ufeff${csv}`, `${filenamePrefix}_${today}.csv`, 'text/csv;charset=utf-8');
  toast('CSV скачан');
}

function exportCurrentTransactions(format = 'csv') {
  const rows = getFilteredTransactions();
  if (!rows.length) {
    toast('Нет транзакций для экспорта', 'error');
    return;
  }
  exportTransactions(rows, format, 'transactions_filtered');
}

function doExport() {
  const format = document.getElementById('expFormat')?.value === 'excel' ? 'xls' : 'csv';
